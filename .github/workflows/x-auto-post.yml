name: The Slip Lab X Auto Posts

on:
  schedule:
    - cron: "30 13 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  post-x-content:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Inject environment variables
        run: |
          echo "X_API_KEY=${{ secrets.X_API_KEY }}" >> .env
          echo "X_API_SECRET=${{ secrets.X_API_SECRET }}" >> .env
          echo "X_ACCESS_TOKEN=${{ secrets.X_ACCESS_TOKEN }}" >> .env
          echo "X_ACCESS_SECRET=${{ secrets.X_ACCESS_SECRET }}" >> .env
          echo "X_DRY_RUN=${{ secrets.X_DRY_RUN }}" >> .env

      - name: Build daily X queue
        run: node scripts/content/build_daily_x_queue.js

      - name: Post X queue
        run: node scripts/content/post_x_queue.js

      - name: Commit updated queue
        run: |
          git config --global user.name "TheSlipLabBot"
          git config --global user.email "bot@thesliplab.com"
          git add website/data/content/
          git diff --cached --quiet || git commit -m "Automated X posting update"

      - name: Push updates
        run: git push
