name: The Slip Lab MLB Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "05 12 * * *"
    - cron: "35 14 * * *"
    - cron: "05 17 * * *"
    - cron: "35 20 * * *"

permissions:
  contents: write
  actions: write

concurrency:
  group: mlb-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Run full Slip Lab pipeline
        timeout-minutes: 12
        run: node scripts/run_all.js

      - name: Stamp update time
        if: always()
        run: |
          node -e "const fs=require('fs');fs.mkdirSync('website/data',{recursive:true});fs.writeFileSync('website/data/site_last_updated.json',JSON.stringify({updatedAt:new Date().toISOString(),updated_at:new Date().toISOString(),source:'github_actions'},null,2));"

      - name: Commit refreshed data
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add website/data exports/content data exports || true
          git commit -m "Refresh MLB data" || echo "No changes to commit"
          git pull origin main --rebase || true
          git push origin main
