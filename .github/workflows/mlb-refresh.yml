name: MLB Auto Refresh

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Fetch MLB Games
        run: node scripts/mlb/fetch_mlb_today.js

      - name: Build MLB Player Pool
        run: node scripts/mlb/build_mlb_player_pool.js

      - name: Build MLB Home Run Board
        run: node scripts/mlb/build_home_run_board.js

      - name: Build MLB Weather Board
        run: node scripts/mlb/build_weather_board.js

      - name: Build Team Stacks
        run: node scripts/mlb/build_team_stacks.js

      - name: Build Statcast Zones
        run: node scripts/mlb/build_statcast_zones.js

      - name: Build HR Results
        run: node scripts/mlb/build_hr_results.js

      - name: Build X Content
        run: node scripts/content/build_x_content.js

      - name: Stamp Site Update Time
        if: always()
        run: |
          mkdir -p website/data
          node -e "const fs=require('fs');fs.writeFileSync('website/data/site_last_updated.json', JSON.stringify({ updated_at:new Date().toISOString(), source:'github_actions', workflow:'mlb-refresh' }, null, 2));"

      - name: Commit Updated Data
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add website/data/**/*.json website/data/*.json exports/content/*.txt || true
          git diff --cached --quiet || git commit -m "Auto refresh MLB data"
          git pull --rebase origin main || true
          git push
