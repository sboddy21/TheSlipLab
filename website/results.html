<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Slip Lab | HR Results</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#05070b;color:#f3f3f3;font-family:Inter,Arial,sans-serif}
    a{text-decoration:none;color:inherit}
    .topbar{width:100%;border-bottom:1px solid rgba(255,255,255,.06);background:#05070b;position:sticky;top:0;z-index:999}
    .topbar-inner{max-width:1600px;margin:auto;padding:12px 22px;display:flex;align-items:center;gap:16px}
    .brand{font-size:20px;font-weight:900;color:white;margin-right:14px;white-space:nowrap}
    .nav{display:flex;gap:8px;flex-wrap:wrap}
    .nav-pill{padding:8px 14px;border-radius:14px;background:#0d1318;border:1px solid rgba(255,255,255,.08);color:#d9d9d9;font-size:12px;font-weight:800}
    .nav-pill.active{background:#93ff2d;color:black;border-color:#93ff2d}
    .wrap{max-width:1600px;margin:auto;padding:24px 22px}
    .title{font-size:32px;font-weight:950;margin-bottom:6px}
    .sub{color:#8e98a3;font-size:13px;margin-bottom:20px}
    .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:18px;flex-wrap:wrap}
    .search{flex:1;min-width:260px;background:#0d1318;border:1px solid rgba(255,255,255,.08);color:#fff;border-radius:14px;padding:12px 14px;font-weight:800}
    .small-pill{background:#0d1318;border:1px solid rgba(255,255,255,.08);color:#d9d9d9;border-radius:14px;padding:11px 14px;font-size:12px;font-weight:900}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px}
    .card{background:#0b1015;border:1px solid rgba(147,255,45,.22);border-radius:16px;padding:14px}
    .badge{display:inline-flex;background:rgba(147,255,45,.12);border:1px solid rgba(147,255,45,.22);color:#93ff2d;border-radius:999px;padding:5px 8px;font-size:10px;font-weight:950;margin-bottom:12px}
    .name{font-size:17px;font-weight:950;margin-bottom:4px}
    .meta{font-size:11px;color:#8e98a3;margin-bottom:12px}
    .metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    .metric{background:#0d1318;border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:10px}
    .metric-label{font-size:9px;color:#8e98a3;text-transform:uppercase;font-weight:900;margin-bottom:4px}
    .metric-value{font-size:15px;font-weight:950}
  </style>
</head>
<body>
<div class="topbar"><div class="topbar-inner">
  <a class="brand" href="./index.html">The Slip Lab</a>
  <div class="nav">
    <a href="./index.html" class="nav-pill">Slate</a>
    <a href="./full-board.html" class="nav-pill">Full Board</a>
    <a href="./matchup-lab.html" class="nav-pill">Matchup Lab</a>
    <a href="./power-zones.html" class="nav-pill">Power Zones</a>
    <a href="./quick-target.html" class="nav-pill">Quick Target</a>
    <a href="./heat-check.html" class="nav-pill">Heat Check</a>
    <a href="./streak-lab.html" class="nav-pill">Streak Lab</a>
    <a href="./weather.html" class="nav-pill">Weather</a>
    <a href="./results.html" class="nav-pill active">Results</a>
    <a href="./hr-decision-center.html" class="nav-pill">Decision Center</a>
  </div>
</div></div>

<main class="wrap">
  <h1 class="title">HR Results</h1>
  <p class="sub">Every player who has hit a home run from the live results file.</p>
  <div class="toolbar">
    <input id="search" class="search" placeholder="Search player, team, opponent, game"/>
    <div class="small-pill" id="status">Loading</div>
  </div>
  <section class="grid" id="grid"></section>
</main>

<script>
let rows = [];
function clean(v){return v === null || v === undefined || v === "" ? "N/A" : String(v)}
function getRows(json){return Array.isArray(json) ? json : json.results || json.data || json.rows || json.homeRuns || []}
function player(row){return row.player || row.name || row.batter || row.hitter || row.playerName || "Unknown Player"}
function team(row){return row.team || row.player_team || row.batter_team || row.hittingTeam || ""}
function opponent(row){return row.opponent || row.opp || row.pitchingTeam || ""}
function homer(row){
  const keys = ["hr","home_run","homeRun","did_homer","hit_hr","result","event","description"];
  return keys.some(k => {
    const s = String(row[k] || "").toLowerCase();
    return s === "1" || s === "true" || s === "yes" || s.includes("home run") || s === "hr";
  });
}
function render(){
  const q = document.getElementById("search").value.toLowerCase();
  const filtered = rows.filter(homer).filter(row => {
    return [player(row),team(row),opponent(row),row.game,row.matchup].join(" ").toLowerCase().includes(q);
  });
  document.getElementById("status").textContent = `${filtered.length} HRs`;
  document.getElementById("grid").innerHTML = filtered.map(row => `
    <article class="card">
      <div class="badge">HOME RUN</div>
      <div class="name">${clean(player(row))}</div>
      <div class="meta">${clean(team(row))} vs ${clean(opponent(row))}</div>
      <div class="metrics">
        <div class="metric"><div class="metric-label">Game</div><div class="metric-value">${clean(row.game || row.matchup)}</div></div>
        <div class="metric"><div class="metric-label">Inning</div><div class="metric-value">${clean(row.inning)}</div></div>
        <div class="metric"><div class="metric-label">Pitcher</div><div class="metric-value">${clean(row.pitcher)}</div></div>
      </div>
    </article>
  `).join("");
}
async function load(){
  const res = await fetch("./data/mlb_results.json?v=" + Date.now());
  const json = await res.json();
  rows = getRows(json);
  document.getElementById("search").addEventListener("input", render);
  render();
}
load();
</script>
</body>
</html>
