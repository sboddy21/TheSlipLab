<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>The Slip Lab | HR Results</title>

<style>
:root{
  --bg:#071019;
  --card:#0f1722;
  --border:#1f2d3d;
  --text:#f3f7fb;
  --muted:#8ea3b7;
  --green:#4ade80;
  --red:#fb7185;
  --yellow:#facc15;
  --blue:#38bdf8;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:Inter,sans-serif;
}

.topbar{
  padding:18px 24px;
  border-bottom:1px solid var(--border);
  background:#08111b;
  position:sticky;
  top:0;
  z-index:20;
}

.brand{
  font-size:24px;
  font-weight:800;
}

.wrap{
  max-width:1400px;
  margin:auto;
  padding:24px;
}

.header{
  margin-bottom:24px;
}

.eyebrow{
  color:var(--blue);
  font-size:13px;
  text-transform:uppercase;
  letter-spacing:1px;
  margin-bottom:8px;
}

.title{
  font-size:40px;
  font-weight:900;
  margin:0;
}

.subtitle{
  color:var(--muted);
  margin-top:8px;
}

.grid{
  display:grid;
  gap:18px;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:20px;
  padding:18px;
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:16px;
}

.player{
  font-size:28px;
  font-weight:900;
  margin-bottom:6px;
}

.meta{
  color:var(--muted);
  font-size:14px;
}

.status{
  padding:6px 12px;
  border-radius:999px;
  font-size:12px;
  font-weight:700;
  background:#132131;
}

.metrics{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(110px,1fr));
  gap:12px;
  margin-top:18px;
}

.metric{
  background:#0a131d;
  border:1px solid #172331;
  border-radius:14px;
  padding:12px;
}

.metric-label{
  color:var(--muted);
  font-size:11px;
  text-transform:uppercase;
  margin-bottom:6px;
}

.metric-value{
  font-size:22px;
  font-weight:800;
}

.desc{
  margin-top:18px;
  color:#d7e3ee;
  line-height:1.5;
}

.expand{
  margin-top:18px;
  padding-top:18px;
  border-top:1px solid var(--border);
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:14px;
}

.detail{
  background:#09131c;
  border:1px solid #162432;
  border-radius:14px;
  padding:12px;
}

.detail-label{
  color:var(--muted);
  font-size:11px;
  text-transform:uppercase;
  margin-bottom:6px;
}

.detail-value{
  font-weight:700;
}

.updated{
  margin-top:28px;
  text-align:center;
  color:var(--muted);
  font-size:13px;
}

@media(max-width:700px){

  .title{
    font-size:28px;
  }

  .player{
    font-size:22px;
  }

  .top{
    flex-direction:column;
  }

}
</style>
</head>

<body>

<div class="topbar">
  <div class="brand">The Slip Lab</div>
</div>

<div class="wrap">

  <div class="header">
    <div class="eyebrow" id="mode">Live HR Intelligence</div>
    <h1 class="title">HR Results</h1>
    <div class="subtitle" id="summary"></div>
  </div>

  <div class="grid" id="board"></div>

  <div class="updated" id="updated"></div>

</div>

<script>

function clean(v){
  return v === undefined || v === null || v === "" ? "—" : v;
}

function metric(label,val){
  return `
    <div class="metric">
      <div class="metric-label">${label}</div>
      <div class="metric-value">${clean(val)}</div>
    </div>
  `;
}

function detail(label,val){
  return `
    <div class="detail">
      <div class="detail-label">${label}</div>
      <div class="detail-value">${clean(val)}</div>
    </div>
  `;
}

async function load(){

  const res = await fetch("./data/mlb_results.json?v=" + Date.now());
  const json = await res.json();

  document.getElementById("mode").textContent =
    clean(json.mode);

  document.getElementById("summary").textContent =
    `${json.count || 0} Home Runs Across ${json.checkedGames || 0} Active/Final Games`;

  document.getElementById("updated").textContent =
    `Updated ${new Date(json.updatedAt).toLocaleString()}`;

  const rows = json.homeRuns || [];

  const board = document.getElementById("board");

  board.innerHTML = rows.map(hr => `

    <div class="card">

      <div class="top">

        <div>

          <div class="player">
            ${clean(hr.player)}
          </div>

          <div class="meta">
            ${clean(hr.team)}
            • vs ${clean(hr.pitcher)}
            • ${clean(hr.inning)}
          </div>

        </div>

        <div class="status">
          ${clean(hr.status)}
        </div>

      </div>

      <div class="metrics">

        ${metric("EV", hr.exitVelocity || "—")}
        ${metric("DIST", hr.distance || "—")}
        ${metric("LA", hr.launchAngle || "—")}
        ${metric("PITCH", hr.pitchType || "—")}
        ${metric("VELO", hr.pitchVelocity || "—")}
        ${metric("COUNT", hr.count || "—")}

      </div>

      <div class="desc">
        ${clean(hr.description)}
      </div>

      <div class="expand">

        ${detail("Game", hr.game)}
        ${detail("Score", hr.score)}
        ${detail("Pitcher", hr.pitcher)}
        ${detail("Opponent", hr.opponent)}
        ${detail("RBI", hr.rbi)}
        ${detail("Play ID", hr.playId)}

      </div>

    </div>

  `).join("");

}

load();

setInterval(load, 300000);

</script>

</body>
</html>
