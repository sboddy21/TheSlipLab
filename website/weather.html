<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Slip Lab | Weather</title>

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#05070b;color:#f3f3f3;font-family:Inter,Arial,sans-serif}
    a{text-decoration:none;color:inherit}

    .topbar{width:100%;border-bottom:1px solid rgba(255,255,255,.06);background:#05070b;position:sticky;top:0;z-index:999}
    .topbar-inner{max-width:1600px;margin:auto;padding:12px 22px;display:flex;align-items:center;gap:16px}
    .brand{font-size:20px;font-weight:900;color:white;margin-right:14px;white-space:nowrap}
    .nav{display:flex;gap:8px;flex-wrap:wrap}
    .nav-pill{padding:8px 14px;border-radius:14px;background:#0d1318;border:1px solid rgba(255,255,255,.08);color:#d9d9d9;font-size:12px;font-weight:800}
    .nav-pill.active{background:#93ff2d;color:black;border-color:#93ff2d}

    .wrap{max-width:1600px;margin:auto;padding:24px 22px}
    .title{font-size:32px;font-weight:950;margin-bottom:6px}
    .sub{color:#8e98a3;font-size:13px;margin-bottom:20px}

    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:14px}

    .card{
      background:#0b1015;
      border:1px solid rgba(255,255,255,.07);
      border-radius:16px;
      overflow:hidden;
      cursor:pointer;
    }

    .card:hover{
      border-color:rgba(147,255,45,.35);
      box-shadow:0 0 28px rgba(147,255,45,.08);
    }

    .park-modal{
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.78);
      z-index:9999;
      padding:24px;
      overflow:auto;
    }

    .park-modal.open{display:block}

    .park-box{
      max-width:820px;
      margin:auto;
      background:#070d11;
      border:1px solid rgba(147,255,45,.28);
      border-radius:16px;
      padding:18px;
    }

    .park-head{
      display:flex;
      justify-content:space-between;
      gap:16px;
      margin-bottom:14px;
    }

    .park-head h2{font-size:28px;margin-bottom:4px}
    .park-head p{color:#9aa4af;font-size:13px}

    .close{
      background:#111820;
      color:white;
      border:1px solid rgba(255,255,255,.12);
      border-radius:10px;
      padding:8px 11px;
      font-weight:900;
      cursor:pointer;
    }

    .park-intel-grid{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:8px;
      margin:12px 0;
    }

    .park-note{
      background:#0d1318;
      border:1px solid rgba(255,255,255,.07);
      border-radius:12px;
      padding:12px;
      color:#dce3ea;
      line-height:1.45;
      margin-top:10px;
    }

    .fit-list{
      display:grid;
      gap:8px;
      margin-top:10px;
    }

    .fit-row{
      display:flex;
      justify-content:space-between;
      gap:12px;
      background:#0d1318;
      border:1px solid rgba(255,255,255,.07);
      border-radius:12px;
      padding:10px;
    }

    .fit-row b{color:#fff}
    .fit-row span{color:#93ff2d;font-weight:950}

    .boost-bar{
      height:10px;
      background:#141a20;
      border:1px solid rgba(255,255,255,.08);
      border-radius:999px;
      overflow:hidden;
      margin-top:7px;
    }

    .boost-fill{
      height:100%;
      background:linear-gradient(90deg,#00d084,#93ff2d,#ffc400,#ff6b2d);
      border-radius:999px;
    }

    .boost-caption{
      display:flex;
      justify-content:space-between;
      color:#8e98a3;
      font-size:10px;
      font-weight:900;
      margin-top:5px;
      text-transform:uppercase;
    }

    .card-top{
      padding:14px;
      display:flex;
      justify-content:space-between;
      gap:12px;
      border-bottom:1px solid rgba(255,255,255,.06);
    }

    .venue{font-size:16px;font-weight:950;margin-bottom:4px}
    .city{font-size:11px;color:#8e98a3}

    .carry{text-align:right}
    .carry-label{font-size:9px;color:#8e98a3;text-transform:uppercase;font-weight:900}
    .carry-score{font-size:28px;font-weight:950;color:#93ff2d}
    .carry-tag{display:inline-flex;margin-top:4px;border-radius:999px;padding:4px 7px;font-size:9px;font-weight:950;background:rgba(147,255,45,.12);border:1px solid rgba(147,255,45,.24);color:#93ff2d}
    .carry-tag.neutral{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.14);color:#d9d9d9}
    .carry-tag.pitcher{background:rgba(80,160,255,.12);border-color:rgba(80,160,255,.22);color:#73b7ff}
    .carry-tag.dome{background:rgba(190,120,255,.12);border-color:rgba(190,120,255,.24);color:#c997ff}
    .carry-meter{margin-top:8px;width:88px;height:8px;border-radius:999px;background:#151b22;border:1px solid rgba(255,255,255,.1);overflow:hidden}
    .carry-meter-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,#5aa7ff,#93ff2d,#ffc400,#ff6b2d)}

    .field-wrap{
      position:relative;
      height:230px;
      background:
        radial-gradient(circle at 50% 92%, rgba(147,255,45,.12), transparent 34%),
        linear-gradient(180deg,#081018,#05070b);
      border-bottom:1px solid rgba(255,255,255,.06);
    }

    .field-svg{
      width:100%;
      height:100%;
      display:block;
    }

    .grass{fill:#12351e}
    .dirt{fill:#69471f}
    .wall{fill:none;stroke:#93ff2d;stroke-width:2.5}
    .line{stroke:rgba(255,255,255,.35);stroke-width:1}
    .dim{fill:#f3f3f3;font-size:11px;font-weight:900}
    .label{fill:#9aa4af;font-size:9px;font-weight:900;text-transform:uppercase}

    .wind-arrow{
      position:absolute;
      left:50%;
      top:50%;
      width:64px;
      height:64px;
      margin-left:-32px;
      margin-top:-32px;
      border-radius:50%;
      border:1px solid rgba(147,255,45,.25);
      background:rgba(5,7,11,.62);
      display:flex;
      align-items:center;
      justify-content:center;
      color:#93ff2d;
      font-size:38px;
      font-weight:950;
      box-shadow:0 0 22px rgba(147,255,45,.18);
    }

    .wind-text{
      position:absolute;
      left:12px;
      top:12px;
      background:rgba(5,7,11,.72);
      border:1px solid rgba(255,255,255,.08);
      border-radius:999px;
      padding:6px 9px;
      font-size:11px;
      font-weight:900;
      color:#fff;
    }

    .metrics{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:8px;
      padding:12px;
    }

    .metric{
      background:#0d1318;
      border:1px solid rgba(255,255,255,.06);
      border-radius:12px;
      padding:9px;
    }

    .metric-label{
      font-size:9px;
      color:#8e98a3;
      text-transform:uppercase;
      font-weight:900;
      margin-bottom:4px;
    }

    .metric-value{
      font-size:14px;
      font-weight:950;
      color:#f3f3f3;
    }

    .boost{
      color:#93ff2d;
    }

    .weather-insight{
      margin:0 12px 12px;
      background:#0d1318;
      border:1px solid rgba(255,255,255,.07);
      border-radius:12px;
      padding:10px;
      color:#c9d1d9;
      font-size:12px;
      line-height:1.4;
    }
  
.weather-hitter-fits{
  margin-top:12px;
  border:1px solid rgba(255,255,255,.10);
  border-radius:16px;
  background:rgba(255,255,255,.045);
  padding:12px;
}

.weather-hitter-fits-title{
  font-size:11px;
  letter-spacing:.13em;
  text-transform:uppercase;
  color:#8cff32;
  font-weight:900;
  margin-bottom:9px;
}

.weather-hitter-fits-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
}

.weather-hitter-fit{
  border:1px solid rgba(255,255,255,.09);
  border-radius:12px;
  padding:9px;
  background:rgba(0,0,0,.16);
}

.weather-hitter-fit strong,
.weather-hitter-fit span,
.weather-hitter-fit b{
  display:block;
}

.weather-hitter-fit strong{
  font-size:12px;
}

.weather-hitter-fit span{
  margin-top:3px;
  font-size:10px;
  opacity:.68;
}

.weather-hitter-fit b{
  margin-top:6px;
  color:#ffb000;
  font-size:14px;
}

@media(max-width:760px){
  .weather-hitter-fits-grid{
    grid-template-columns:1fr;
  }
}


.realistic-park-svg .danger-pill rect{
  fill:rgba(255,176,0,.16);
  stroke:rgba(255,176,0,.38);
}

.realistic-park-svg .danger-pill text{

  font-weight:900;
  letter-spacing:.04em;
  text-transform:uppercase;
}


.park-visual-legend{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin-top:10px;
}

.park-legend-item{
  display:flex;
  align-items:center;
  gap:7px;
  border:1px solid rgba(255,255,255,.09);
  border-radius:12px;
  background:rgba(255,255,255,.04);
  padding:8px;
  min-width:0;
}

.park-legend-dot{
  width:10px;
  height:10px;
  border-radius:50%;

}

.park-legend-dot.wind{
  background:#00e0ff;
  box-shadow:0 0 12px rgba(0,224,255,.55);
}

.park-legend-dot.rhb{
  background:#ffb000;
  box-shadow:0 0 12px rgba(255,176,0,.55);
}

.park-legend-dot.lhb{
  background:#8cff32;
  box-shadow:0 0 12px rgba(140,255,50,.45);
}

.park-legend-item b{
  font-size:11px;
  color:#fff;
  white-space:nowrap;
}

.park-legend-item small{
  font-size:10px;
  opacity:.68;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;

  }

.park-attack-summary{
  margin:10px 12px 0;
  border:1px solid rgba(140,255,50,.18);

}

.park-attack-top{

}

  font-size:10px;

}

.park-attack-top strong{

  font-size:13px;

}

.park-attack-copy{

.park-attack-copy b{

.park-lane-chips{
  display:grid;

.park-lane-chip{

  border-radius:12px;
  padding:9px 10px;
  background:rgba(255,255,255,.04);
}

.park-lane-chip span,
.park-lane-chip strong{

}

.park-lane-chip span{

  letter-spacing:.10em;

  font-weight:900;
}

.park-lane-chip strong{

.park-lane-chip.elite strong,

}

</style>

<main class="wrap">
  <h1 class="title">Weather</h1>
  <p class="sub">Ballpark layout, live wind direction, temperature, and HR carry conditions.</p>
  <section class="grid" id="grid"></section>
</main>

<div class="park-modal" id="parkModal">
  <div class="park-box">
    <div class="park-head">
      <div>
        <h2 id="parkTitle">Ballpark</h2>
        <p id="parkSub">Weather and HR environment</p>
      </div>
      <button class="close" id="parkClose">Close</button>
    </div>

    <div class="park-intel-grid" id="parkIntel"></div>
    <div class="park-note" id="parkNote"></div>

    <h3 style="margin-top:16px;font-size:14px;letter-spacing:.12em;text-transform:uppercase;color:#93ff2d">Today’s Best Field Fits</h3>
    <div class="fit-list" id="parkFits"></div>
  </div>
</div>

<script>
let PARK_GEOMETRY = {};
const PARK_SHAPES = {
  "Great American Ball Park": "M60 96 Q105 55 165 47 Q220 36 285 54 Q330 67 360 96",
  "Nationals Park": "M60 96 Q115 56 210 42 Q305 56 360 96",
  "PNC Park": "M60 96 Q100 48 170 37 Q238 31 315 55 Q360 96",
  "Yankee Stadium": "M60 96 Q112 55 178 44 Q235 37 305 54 Q360 96",
  "Fenway Park": "M60 96 Q92 67 155 51 Q220 44 300 60 Q360 96",
  "Wrigley Field": "M60 96 Q112 58 210 42 Q308 58 360 96",
  "Citizens Bank Park": "M60 96 Q116 54 210 39 Q304 54 360 96",
  "Camden Yards": "M60 96 Q102 49 165 40 Q235 33 315 55 Q360 96",
  "Oriole Park at Camden Yards": "M60 96 Q102 49 165 40 Q235 33 315 55 Q360 96",
  "Chase Field": "M60 96 Q114 57 210 42 Q306 57 360 96",
  "Kauffman Stadium": "M60 96 Q106 45 168 35 Q210 30 252 35 Q314 45 360 96",
  "Oracle Park": "M60 96 Q118 58 190 47 Q255 39 315 60 Q360 96",
  "Rogers Centre": "M60 96 Q115 56 210 42 Q305 56 360 96",
  "loanDepot park": "M60 96 Q108 47 170 36 Q230 34 300 50 Q360 96",
  "Petco Park": "M60 96 Q104 48 174 38 Q238 40 305 55 Q360 96",
  "Angel Stadium": "M60 96 Q110 50 180 40 Q230 39 300 55 Q360 96",
  "Truist Park": "M60 96 Q112 53 210 40 Q300 55 360 96",
  "American Family Field": "M60 96 Q114 56 210 42 Q306 56 360 96",
  "Coors Field": "M60 96 Q100 43 165 31 Q210 25 255 31 Q320 43 360 96",
  "T-Mobile Park": "M60 96 Q112 55 190 42 Q248 42 314 58 Q360 96",
  "Dodger Stadium": "M60 96 Q112 54 210 40 Q308 54 360 96",
  "Busch Stadium": "M60 96 Q110 53 210 39 Q310 53 360 96",
  "Target Field": "M60 96 Q102 51 172 41 Q242 38 312 57 Q360 96",
  "Comerica Park": "M60 96 Q98 43 160 34 Q215 31 292 49 Q360 96",
  "Progressive Field": "M60 96 Q110 54 205 41 Q298 54 360 96",
  "Globe Life Field": "M60 96 Q112 54 210 41 Q308 54 360 96",
  "Minute Maid Park": "M60 96 Q96 57 165 46 Q235 39 315 59 Q360 96",
  "Guaranteed Rate Field": "M60 96 Q112 55 210 41 Q308 55 360 96",
  "Rate Field": "M60 96 Q112 55 210 41 Q308 55 360 96",
  "Tropicana Field": "M60 96 Q116 57 210 43 Q304 57 360 96",
  "Sutter Health Park": "M60 96 Q113 56 210 42 Q307 56 360 96"
};

function parkShape(venue){
  return PARK_GEOMETRY[venue] || PARK_GEOMETRY.default || {
    dimensions: {lf:330, lcf:375, cf:400, rcf:375, rf:330},
    wallPath: "M70 101 L114 62 L169 47 L210 40 L251 47 L306 62 L350 101"
  };
}


function clean(v){
  if(v === null || v === undefined || v === "") return "N/A";
  return String(v);
}

function num(v){
  const n = Number(v);
  return Number.isFinite(n) ? n : 0;
}

function carryScore(row){
  const wind = num(row.windSpeed || row.wind_speed);
  const temp = num(row.temp || row.temperature);
  let s = wind * 1.8;
  if(temp > 65) s += (temp - 65) * .7;
  return Math.max(0,s);
}

function fmt(v){
  const n = Number(v);
  return Number.isFinite(n) ? n.toFixed(1) : "0.0";
}

function dec(v){
  const n = Number(v);
  return Number.isFinite(n) ? n.toFixed(3).replace(/^0/, "") : "N/A";
}

function parkDims(venue){
  return parkShape(venue).dimensions || {lf:330, lcf:375, cf:400, rcf:375, rf:330};
}

function hrBoost(row){
  const carry = carryScore(row);
  const venue = clean(row.venue);
  let base = 50;

  if(["Great American Ball Park","Yankee Stadium","Citizens Bank Park","Wrigley Field","Camden Yards","Oriole Park at Camden Yards"].includes(venue)) base += 12;
  if(["Oracle Park","Petco Park","loanDepot park","Kauffman Stadium"].includes(venue)) base -= 8;

  return Math.max(0, Math.min(100, base + carry));
}

function carryTag(row){
  const venue = clean(row.venue);
  const status = clean(row.status).toLowerCase();
  const roof = clean(row.roof || row.roofStatus || row.dome).toLowerCase();
  const boost = hrBoost(row);

  if (status.includes("dome") || roof.includes("dome") || roof.includes("closed")) {
    return { label: "DOME", cls: "dome" };
  }

  if (boost >= 72) return { label: "HR BOOST", cls: "" };
  if (boost >= 55) return { label: "NEUTRAL PLUS", cls: "neutral" };
  return { label: "PITCHER LEAN", cls: "pitcher" };
}

function parkProfile(row){
  const venue = clean(row.venue);
  const wind = clean(row.windSpeed || row.wind_speed);
  const dir = clean(row.windCompass || row.windDirection || "Unknown");
  const temp = num(row.temp || row.temperature);
  const humidity = clean(row.humidity || row.humid || row.relativeHumidity);

  const boost = hrBoost(row);
  const type = boost >= 72 ? "Power friendly" : boost >= 55 ? "Neutral plus" : "Pitcher leaning";

  return {
    boost,
    humidity,
    type,
    note:`${venue} is grading as ${type.toLowerCase()} today. Wind is ${wind} MPH ${dir}. ${temp >= 75 ? "Warm air should help carry." : temp <= 55 ? "Cooler air can mute carry." : "Temperature is neutral."} Best fits are hitters with pull power, strong SLG, high OPS, and barrel strength.`
  };
}

function allSlateHitters(){
  return (window.__weatherHitters || []);
}

function statNumber(row, key){
  const s = row?.hitterStats || row?.stats?.hitter || row?.stats || {};
  return num(s[key] ?? row[key]);
}

function bestFitsForPark(venue){
  const target = clean(venue);

  return allSlateHitters()
    .filter(row => {
      return clean(row.venue) === target ||
        clean(row.gameVenue) === target ||
        clean(row.ballpark) === target ||
        clean(row.park) === target ||
        clean(row.game).includes(target);
    })
    .map(row => {
      const hr = statNumber(row,"hr");
      const slg = statNumber(row,"slg");
      const ops = statNumber(row,"ops");
      const score = num(row.score || row.hrConfidence || row.powerScore);
      return {...row, fitScore: score + hr * 1.3 + slg * 35 + ops * 20};
    })
    .sort((a,b) => b.fitScore - a.fitScore)
    .slice(0,6);
}

function openPark(row){
  const venue = clean(row.venue);
  const p = parkProfile(row);
  const dims = parkDims(venue);
  const temp = clean(row.temp || row.temperature);
  const wind = clean(row.windSpeed || row.wind_speed);
  const dir = clean(row.windCompass || row.windDirection || "Unknown");

  document.getElementById("parkTitle").textContent = venue;
  document.getElementById("parkSub").textContent = clean(row.city);
  document.getElementById("parkIntel").innerHTML = `
    <div class="metric"><div class="metric-label">HR Boost</div><div class="metric-value boost">${fmt(p.boost)}</div></div>
    <div class="metric"><div class="metric-label">Humidity</div><div class="metric-value">${p.humidity}</div></div>
    <div class="metric"><div class="metric-label">Temp</div><div class="metric-value">${temp}°</div></div>
    <div class="metric"><div class="metric-label">Wind</div><div class="metric-value">${wind} MPH</div></div>
    <div class="metric"><div class="metric-label">Impact</div><div class="metric-value">${windImpactLabel(row)}</div></div>
    <div class="metric"><div class="metric-label">LF</div><div class="metric-value">${dims.lf}</div></div>
    <div class="metric"><div class="metric-label">CF</div><div class="metric-value">${dims.cf}</div></div>
    <div class="metric"><div class="metric-label">RF</div><div class="metric-value">${dims.rf}</div></div>
  `;
  document.getElementById("parkNote").innerHTML = `
    <div><strong>Home Run Boost:</strong> ${fmt(p.boost)}%</div>
    <div class="boost-bar"><div class="boost-fill" style="width:${Math.max(0, Math.min(100, p.boost))}%"></div></div>
    <div class="boost-caption"><span>Pitcher park</span><span>Neutral</span><span>HR boost</span></div>
    <div style="margin-top:10px">${p.note}</div>
  `;

  const fits = bestFitsForPark(venue);
  document.getElementById("parkFits").innerHTML = fits.length ? fits.map(player => `
    <div class="fit-row">
      <b>${clean(player.player)}</b>
      <span>${Math.round(player.fitScore)} fit · ${statNumber(player,"hr")} HR · ${dec(statNumber(player,"slg"))} SLG</span>
    </div>
  `).join("") : `<div class="park-note">No matching slate hitters were found for this venue yet.</div>`;

  document.getElementById("parkModal").classList.add("open");
}

function windImpactLabel(row){
  const speed = num(row.windSpeed || row.wind_speed);
  const deg = num(row.arrowDegrees || row.windDirection);

  if (speed < 3) return "Light wind";

  const normalized = ((deg % 360) + 360) % 360;

  if (normalized >= 330 || normalized < 30) return "Blowing out to CF";
  if (normalized >= 30 && normalized < 75) return "Blowing out to RF";
  if (normalized >= 75 && normalized < 120) return "Crosswind to RF";
  if (normalized >= 120 && normalized < 165) return "Blowing in from RF";
  if (normalized >= 165 && normalized < 195) return "Blowing in from CF";
  if (normalized >= 195 && normalized < 240) return "Blowing in from LF";
  if (normalized >= 240 && normalized < 285) return "Crosswind to LF";
  return "Blowing out to LF";
}

function arrowRotation(row){
  const deg = num(row.arrowDegrees);
  if(deg) return deg;
  return num(row.windDirection);
}

function safeId(value){
  return String(value || "park").replace(/[^a-zA-Z0-9]/g, "-");
}

function fieldDangerSections(row){
  const impact = windImpactLabel(row);
  const boost = hrBoost(row);
  const speed = num(row.windSpeed || row.wind_speed);

  let lf = 48;
  let cf = 48;
  let rf = 48;

  if (impact.includes("out to LF")) lf += 28;
  if (impact.includes("out to CF")) cf += 28;
  if (impact.includes("out to RF")) rf += 28;

  if (impact.includes("Crosswind to LF")) lf += 12;
  if (impact.includes("Crosswind to RF")) rf += 12;

  if (impact.includes("in from LF")) lf -= 20;
  if (impact.includes("in from CF")) cf -= 20;
  if (impact.includes("in from RF")) rf -= 20;

  if (speed >= 12 && impact.includes("out")) {
    lf += impact.includes("LF") ? 8 : 0;
    cf += impact.includes("CF") ? 8 : 0;
    rf += impact.includes("RF") ? 8 : 0;
  }

  const carryBonus = Math.max(-10, Math.min(16, Math.round((boost - 55) / 2.5)));
  lf += carryBonus;
  cf += carryBonus;
  rf += carryBonus;

  function zone(v){
    if (v >= 78) return { label:"Elite", tier:"elite", opacity:.34 };
    if (v >= 66) return { label:"Strong", tier:"strong", opacity:.25 };
    if (v >= 55) return { label:"Live", tier:"live", opacity:.18 };
    if (v <= 40) return { label:"Avoid", tier:"avoid", opacity:.12 };
    return { label:"Neutral", tier:"neutral", opacity:.14 };
  }

  return {
    lf: zone(lf),
    cf: zone(cf),
    rf: zone(rf)
  };
}

function attackZoneFill(zone){
  if (!zone) return "rgba(255,255,255,.08)";
  if (zone.tier === "elite") return "rgba(140,255,50,.36)";
  if (zone.tier === "strong") return "rgba(140,255,50,.25)";
  if (zone.tier === "live") return "rgba(255,176,0,.22)";
  if (zone.tier === "avoid") return "rgba(255,70,70,.16)";
  return "rgba(255,255,255,.09)";
}

function attackZoneStroke(zone){
  if (!zone) return "rgba(255,255,255,.12)";
  if (zone.tier === "elite") return "rgba(140,255,50,.70)";
  if (zone.tier === "strong") return "rgba(140,255,50,.52)";
  if (zone.tier === "live") return "rgba(255,176,0,.48)";
  if (zone.tier === "avoid") return "rgba(255,70,70,.42)";
  return "rgba(255,255,255,.18)";
}

function windConePath(row){
  const deg = arrowRotation(row);
  const normalized = ((deg % 360) + 360) % 360;

  if (normalized >= 330 || normalized < 30) {
    return "M210 230 L170 58 Q210 35 250 58 Z";
  }

  if (normalized >= 30 && normalized < 75) {
    return "M210 230 L238 65 Q295 70 350 101 Z";
  }

  if (normalized >= 285 && normalized < 330) {
    return "M210 230 L182 65 Q125 70 70 101 Z";
  }

  if (normalized >= 75 && normalized < 120) {
    return "M210 230 L255 95 Q305 130 350 160 Z";
  }

  if (normalized >= 240 && normalized < 285) {
    return "M210 230 L165 95 Q115 130 70 160 Z";
  }

  return "";
}

function fieldSvg(venue, row = {}){
  const shape = parkShape(venue);
  const d = shape.dimensions || {lf:330, lcf:375, cf:400, rcf:375, rf:330};
  const wallPath = shape.wallPath || "M70 101 L114 62 L169 47 L210 40 L251 47 L306 62 L350 101";
  const grassPath = `${wallPath} L210 230 Z`;
  const trackPath = `${wallPath} L350 114 L315 95 L277 79 L238 69 L210 66 L182 69 L143 79 L105 95 L70 114 Z`;
  const id = safeId(venue);
  const lanes = shape.lanes || {};
  const leftyPull = lanes.leftyPull || "M210 230 L350 101 L315 95 L277 79 L238 69 L210 66 L255 190 Z";
  const rightyPull = lanes.rightyPull || "M210 230 L70 101 L105 95 L143 79 L182 69 L210 66 L165 190 Z";

          <stop offset="100%" stop-color="#5a2b16"/>
        </linearGradient>
        <linearGradient id="leftyLane-${id}" x1="55%" y1="70%" x2="100%" y2="20%">
          <stop offset="0%" stop-color="#8cff32" stop-opacity=".02"/>
          <stop offset="62%" stop-color="#8cff32" stop-opacity=".14"/>
          <stop offset="100%" stop-color="#8cff32" stop-opacity=".26"/>
        </linearGradient>
        <linearGradient id="rightyLane-${id}" x1="45%" y1="70%" x2="0%" y2="20%">
          <stop offset="0%" stop-color="#ffb000" stop-opacity=".02"/>
          <stop offset="62%" stop-color="#ffb000" stop-opacity=".14"/>
          <stop offset="100%" stop-color="#ffb000" stop-opacity=".26"/>
        </linearGradient>
        <linearGradient id="carryCone-${id}" x1="50%" y1="90%" x2="50%" y2="10%">
          <stop offset="0%" stop-color="#00e0ff" stop-opacity=".04"/>
          <stop offset="55%" stop-color="#00e0ff" stop-opacity=".15"/>
          <stop offset="100%" stop-color="#00e0ff" stop-opacity=".32"/>
        </linearGradient>
        <filter id="parkWallGlow-${id}" x="-40%" y="-40%" width="180%" height="180%">
          <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#ffb000" flood-opacity=".65"/>
        </filter>
      </defs>

      <path d="${grassPath}" fill="url(#grassGlow-${id})" stroke="rgba(255,255,255,.05)" stroke-width="1"></path>
      <path d="${trackPath}" fill="url(#trackGlow-${id})" opacity=".72"></path>

      <path d="M210 230 L70 101 L135 76 L182 69 L210 66 Z" fill="${attackZoneFill(danger.lf)}" stroke="${attackZoneStroke(danger.lf)}" stroke-width="1.1"></path>
      <path d="M210 230 L182 69 L210 52 L238 69 Z" fill="${attackZoneFill(danger.cf)}" stroke="${attackZoneStroke(danger.cf)}" stroke-width="1.1"></path>
      <path d="M210 230 L238 69 L285 76 L350 101 Z" fill="${attackZoneFill(danger.rf)}" stroke="${attackZoneStroke(danger.rf)}" stroke-width="1.1"></path>

      ${conePath ? `<path d="${conePath}" fill="url(#carryCone-${id})" stroke="rgba(0,224,255,.28)" stroke-width="1.4"></path>` : ""}
      <path d="${rightyPull}" fill="url(#rightyLane-${id})" stroke="rgba(255,176,0,.26)" stroke-width="1.2"></path>
      <path d="${leftyPull}" fill="url(#leftyLane-${id})" stroke="rgba(140,255,50,.25)" stroke-width="1.2"></path>

      <path d="M210 230 L165 190 L210 150 L255 190 Z" fill="#8f4d22" opacity=".88" stroke="rgba(255,255,255,.12)" stroke-width="1.5"></path>
      <path d="M210 230 L190 210 L210 190 L230 210 Z" fill="#a9632b" opacity=".95"></path>

      <line x1="210" y1="230" x2="70" y2="101" stroke="rgba(255,255,255,.55)" stroke-width="1.5"></line>
      <line x1="210" y1="230" x2="350" y2="101" stroke="rgba(255,255,255,.55)" stroke-width="1.5"></line>
      <line x1="210" y1="230" x2="210" y2="50" stroke="rgba(255,255,255,.08)" stroke-width="1"></line>

      <path d="${wallPath}" fill="none" stroke="#ffb000" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#parkWallGlow-${id})"></path>
      <path d="${wallPath}" fill="none" stroke="rgba(255,255,255,.78)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"></path>

      <line x1="70" y1="101" x2="70" y2="84" stroke="#ffd15a" stroke-width="3"></line>
      <line x1="350" y1="101" x2="350" y2="84" stroke="#ffd15a" stroke-width="3"></line>

      <circle cx="210" cy="230" r="4.5" fill="#f3f3f3" opacity=".95"></circle>
      <circle cx="165" cy="190" r="3.2" fill="#f3f3f3" opacity=".82"></circle>
      <circle cx="210" cy="150" r="3.2" fill="#f3f3f3" opacity=".82"></circle>
      <circle cx="255" cy="190" r="3.2" fill="#f3f3f3" opacity=".82"></circle>

      <text class="dim" x="54" y="82">${d.lf}</text>

      <text class="dim" x="286" y="46">${d.rcf}</text>
      <text class="dim" x="347" y="82">${d.rf}</text>

      <text class="label" x="42" y="119">LF</text>
      <text class="label" x="194" y="58">CF</text>
      <text class="label" x="360" y="119">RF</text>
      <text class="label" x="82" y="138">RHB pull</text>
      <text class="label" x="295" y="138">LHB pull</text>
      ${conePath ? `<text class="label" x="176" y="78">Wind carry</text>` : ""}

function parkLaneChips(row){
  const zones = fieldDangerSections(row);

  return `
    <div class="park-lane-chips">
      <div class="park-lane-chip ${zones.lf.tier}">
        <span>LF Lane</span>
        <strong>${zones.lf.label}</strong>
      </div>
      <div class="park-lane-chip ${zones.cf.tier}">
        <span>CF Lane</span>
        <strong>${zones.cf.label}</strong>
      </div>
      <div class="park-lane-chip ${zones.rf.tier}">
        <span>RF Lane</span>
        <strong>${zones.rf.label}</strong>
      </div>
    </div>
  `;
}

function parkAttackSummary(row){
  const zones = fieldDangerSections(row);
  const impact = windImpactLabel(row);
  const boost = hrBoost(row);

  const ranked = [
    ["LF", zones.lf],
    ["CF", zones.cf],
    ["RF", zones.rf]
  ].sort((a, b) => {
    const score = { Elite: 5, Strong: 4, Live: 3, Neutral: 2, Avoid: 1 };
    return score[b[1].label] - score[a[1].label];
  });

  const top = ranked[0];

  return `
    <div class="park-attack-summary">
      <div class="park-attack-top">
        <span>Best attack lane</span>
        <strong>${top[0]} • ${top[1].label}</strong>
      </div>
      <div class="park-attack-copy">
        ${clean(impact)} with a ${Math.round(boost)} carry score.
        <b>${top[0]}</b> is the best HR hunting lane in this park today.
      </div>
    </div>
  `;
}

function parkVisualLegend(row){
  const impact = windImpactLabel(row);

  return `
    <div class="park-visual-legend">
      <div class="park-legend-item">
        <span class="park-legend-dot wind"></span>
        <b>Blue</b>
        <small>${clean(impact)}</small>
      </div>
      <div class="park-legend-item">
        <span class="park-legend-dot rhb"></span>
        <b>Orange</b>
        <small>Right handed pull lane</small>
      </div>
      <div class="park-legend-item">
        <span class="park-legend-dot lhb"></span>
        <b>Green</b>
        <small>Left handed pull lane</small>
      </div>
    </div>
  `;
}

function hitterFitScore(player, row){
  const power = num(player.hrScore || player.score || player.powerScore || player.hitterPower || player.barrelScore);
  const bats = String(player.bats || player.hand || player.side || "").toUpperCase();
  const impact = windImpactLabel(row);
  let bonus = 0;

  if (bats.startsWith("L") && impact.includes("RF")) bonus += 8;
  if (bats.startsWith("R") && impact.includes("LF")) bonus += 8;
  if (impact.includes("out to CF")) bonus += 5;
  if (impact.includes("in from")) bonus -= 6;

  return Math.round(power + bonus);
}

function weatherHitterFits(row){
  const venue = clean(row.venue);
  const hitters = Array.isArray(window.__weatherHitters) ? window.__weatherHitters : [];

  const fits = hitters
    .filter(p => clean(p.venue || p.gameVenue) === venue)
    .map(p => ({
      name: p.player || p.name || p.hitter || "Unknown",
      team: p.team || "",
      bats: p.bats || p.hand || "",
      score: hitterFitScore(p, row)
    }))
    .filter(p => p.name !== "Unknown")
    .sort((a, b) => b.score - a.score)
    .slice(0, 3);

  if (!fits.length) return "";

  return `
    <div class="weather-hitter-fits">
      <div class="weather-hitter-fits-title">Best park fits today</div>
      <div class="weather-hitter-fits-grid">
        ${fits.map(p => `
          <div class="weather-hitter-fit">
            <strong>${clean(p.name)}</strong>
            <span>${clean(p.team)} ${p.bats ? "• " + clean(p.bats) : ""}</span>
            <b>${p.score}</b>
          </div>
        `).join("")}
      </div>
    </div>
  `;
}

function weatherInsight(row){
  const speed = num(row.windSpeed || row.wind_speed);
  const temp = num(row.temp || row.temperature);
  const impact = windImpactLabel(row);
  const boost = hrBoost(row);
  const venue = clean(row.venue);

  if (speed < 3 && temp >= 75) return `Light wind, but warm air still gives ${venue} some carry support.`;
  if (speed < 3) return `Light wind keeps this mostly park driven instead of weather driven.`;
  if (impact.includes("out to RF")) return `Wind is helping balls carry toward right field, which favors left handed pull power.`;
  if (impact.includes("out to LF")) return `Wind is helping balls carry toward left field, which favors right handed pull power.`;
  if (impact.includes("out to CF")) return `Wind is helping straightaway carry, boosting well struck fly balls to the deepest part of the park.`;
  if (impact.includes("in from")) return `Wind is working against carry, so only true barrel contact gets a real boost.`;
  if (impact.includes("Crosswind")) return `Crosswind can move fly balls, but the HR impact is more neutral than direct outfield wind.`;
  if (boost >= 72) return `${venue} is grading as one of the better HR environments on the slate.`;

  return `${venue} is playing closer to neutral unless the hitter has strong raw power.`;
}

async function load(){
  try {
    const shapeRes = await fetch("./data/mlb_park_shapes.json?v=" + Date.now());
    PARK_GEOMETRY = await shapeRes.json();
  } catch {
    PARK_GEOMETRY = {};
  }

  const res = await fetch("./data/mlb_weather.json?v=" + Date.now());
  const json = await res.json();
  const rows = Array.isArray(json) ? json : json.weather || [];

  try {
    const matchupRes = await fetch("./data/game_pitcher_matchups.json?v=" + Date.now());
    const matchupJson = await matchupRes.json();
    const games = matchupJson.matchups || matchupJson.games || [];
    window.__weatherHitters = games.flatMap(game => [
      ...(game.hitters?.away || []).map(player => ({...player, venue: game.venue, gameVenue: game.venue})),
      ...(game.hitters?.home || []).map(player => ({...player, venue: game.venue, gameVenue: game.venue}))
    ]);
  } catch {
    window.__weatherHitters = [];
  }

  const sorted = rows
    .map(row => ({...row, carry:carryScore(row)}))
    .sort((a,b) => b.carry - a.carry);

  document.getElementById("grid").innerHTML = sorted.map(row => {
    const venue = clean(row.venue);
    const city = clean(row.city || row.location || "");
    const carry = carryScore(row);
    const temp = num(row.temp || row.temperature);
    const wind = num(row.windSpeed || row.wind_speed);
    const direction = clean(row.windDirectionText || row.windDirection || row.direction);
    const impact = windImpactLabel(row);
    const boostLabel = carry >= 22 ? "HR BOOST" : "NEUTRAL PLUS";

    return `
      <article class="weather-card" onclick="openParkModal('${venue.replace(/'/g, "\\'")}')">
        <div class="weather-card-head">
          <div>
            <h2>${venue}</h2>
            <span>${city}</span>
          </div>
          <div class="carry-box">
            <small>HR Carry</small>
            <strong>${carry.toFixed(1)}</strong>
            <em>${boostLabel}</em>
          </div>
        </div>

        <div class="wind-pill">${wind ? wind + " MPH" : "Calm"} ${direction} • ${impact}</div>

        <div class="weather-field-wrap">
          ${fieldSvg(venue, row)}
        </div>

        ${parkLaneChips(row)}
        ${parkAttackSummary(row)}

        <div class="weather-stat-grid">
          <div class="weather-stat">
            <span>Temp</span>
            <strong>${temp ? temp + "°" : "—"}</strong>
          </div>
          <div class="weather-stat">
            <span>Wind</span>
            <strong>${wind ? wind + " MPH" : "Calm"}</strong>
          </div>
          <div class="weather-stat">
            <span>Direction</span>
            <strong>${direction || "—"}</strong>
          </div>
          <div class="weather-stat">
            <span>Carry</span>
            <strong>${carry.toFixed(1)}</strong>
          </div>
        </div>

        <div class="weather-insight">${weatherInsight(row)}</div>
      </article>
    `;

  }).join("");

  document.querySelectorAll(".card[data-venue]").forEach(card => {
    card.addEventListener("click", () => {
      const row = sorted.find(item => clean(item.venue) === card.dataset.venue);
      if(row) openPark(row);
    });
  });
}

document.getElementById("parkClose").addEventListener("click", () => {
  document.getElementById("parkModal").classList.remove("open");
});

document.getElementById("parkModal").addEventListener("click", event => {
  if(event.target.id === "parkModal") document.getElementById("parkModal").classList.remove("open");
});

load();
</script>
