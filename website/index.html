<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Slip Lab | HR Slate</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#050808;color:#f4fff8;font-family:Inter,Arial,sans-serif}
a{text-decoration:none;color:inherit}.topbar{position:sticky;top:0;z-index:1000;background:#060909;border-bottom:1px solid rgba(255,255,255,.08)}.topbar-inner{max-width:1500px;margin:auto;padding:10px 18px;display:flex;gap:16px;align-items:center}.brand{font-size:20px;font-weight:950}.nav{display:flex;gap:7px;flex-wrap:wrap}.nav a{background:#101719;border:1px solid rgba(255,255,255,.1);border-radius:13px;padding:8px 12px;font-size:12px;font-weight:900}.nav a.active{background:#8cff32;color:#071007;border-color:#8cff32}.wrap{max-width:1500px;margin:auto;padding:22px 18px 80px}.eyebrow{font-size:10px;color:#91a19a;letter-spacing:.16em;text-transform:uppercase;font-weight:950}h1{font-size:30px;margin:6px 0}.sub{color:#9aaba4;font-size:13px;margin-bottom:18px}.hero{background:#081010;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:16px;margin-bottom:14px}.tabs{display:flex;gap:9px;overflow:auto;margin:14px 0 18px;padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,.08)}.tabs button{background:#11191b;border:1px solid rgba(255,255,255,.1);color:#dce8e3;border-radius:12px;padding:9px 13px;font-size:12px;font-weight:950;cursor:pointer;white-space:nowrap}.tabs button.active{background:rgba(140,255,50,.14);color:#8cff32;border-color:#8cff32}.tabs small{display:block;color:#7f8f88;font-size:10px;margin-top:3px}.games{display:flex;flex-direction:column;gap:16px}.game-card{background:#081010;border:1px solid rgba(255,255,255,.08);border-radius:16px;overflow:hidden}.game-head{display:flex;justify-content:space-between;gap:14px;align-items:flex-start;padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.07);background:linear-gradient(135deg,rgba(0,224,164,.09),rgba(8,16,16,.95))}.game-head h2{font-size:20px}.game-meta{color:#9aaba4;font-size:12px;margin-top:5px}.pill{background:#11191b;border:1px solid rgba(140,255,50,.35);color:#8cff32;border-radius:999px;padding:8px 11px;font-size:11px;font-weight:950;white-space:nowrap}.matchup-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:14px}.side{border:1px solid rgba(255,255,255,.08);border-radius:14px;background:#061010;overflow:hidden}.side-top{display:grid;grid-template-columns:1fr 72px;gap:12px;padding:14px;background:linear-gradient(135deg,rgba(140,255,50,.11),rgba(8,16,16,.98))}.pitcher{font-size:20px;font-weight:950}.pitcher-sub{color:#9aaba4;font-size:12px;margin-top:4px}.vbox{height:72px;border:1px solid rgba(0,224,164,.35);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-direction:column;background:rgba(0,224,164,.08)}.vbox b{font-size:28px;color:#8cff32}.vbox span{font-size:9px;color:#a5b4ae;font-weight:950}.mini{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:13px;text-align:center}.mini label{display:block;color:#7f8f88;font-size:9px;text-transform:uppercase;font-weight:950}.mini b{font-size:14px}.danger{padding:12px}.danger-head{display:flex;justify-content:space-between;color:#a4b2ad;font-size:10px;letter-spacing:.15em;text-transform:uppercase;font-weight:950;margin-bottom:8px}.bats{display:flex;flex-direction:column;gap:7px}.bat{display:grid;grid-template-columns:30px 1fr 70px;gap:9px;min-height:72px;padding:9px;border-radius:9px;border-left:3px solid #00e0a4;background:linear-gradient(90deg,rgba(0,224,164,.12),rgba(8,16,16,.98))}.bat:first-child{border-left-color:#8cff32;background:linear-gradient(90deg,rgba(140,255,50,.16),rgba(8,16,16,.98))}.face{width:28px;height:28px;border-radius:50%;background:#1b2b31;border:1px solid rgba(255,255,255,.14);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:950}.bat-name{font-size:14px;font-weight:950;margin-bottom:4px}.tags{display:flex;gap:5px;flex-wrap:wrap}.tag{font-size:9px;font-weight:950;border-radius:6px;padding:4px 6px;border:1px solid rgba(255,255,255,.12);background:#111a1e}.green{color:#8cff32;border-color:rgba(140,255,50,.35)}.teal{color:#00e0a4;border-color:rgba(0,224,164,.35)}.gold{color:#ffd25a;border-color:rgba(255,210,90,.35)}.red{color:#ff6374;border-color:rgba(255,99,116,.35)}.why{font-size:11px;color:#cbd8d2;margin-top:4px}.score{text-align:right;font-size:12px;font-family:monospace;line-height:1.45}.score b{color:#8cff32;font-size:18px}.weather{display:flex;gap:10px;flex-wrap:wrap;border-top:1px solid rgba(255,255,255,.07);padding:10px 14px;color:#a4b2ad;font-size:12px}.weather b{color:#8cff32}.empty{padding:16px;color:#a4b2ad}.error{background:#2a0c12;border:1px solid #ff6374;color:#fff;border-radius:14px;padding:16px}@media(max-width:1000px){.matchup-grid{grid-template-columns:1fr}.game-head{flex-direction:column}.nav{max-height:76px;overflow:auto}}
</style>
</head>
<body>
<div class="topbar"><div class="topbar-inner"><a class="brand" href="./index.html">The Slip Lab</a><nav class="nav"><a class="active">Slate</a><a href="./full-board.html">Full Board</a><a href="./matchup-lab.html">Matchup Lab</a><a href="./power-zones.html">Power Zones</a><a href="./quick-target.html">Quick Target</a><a href="./heat-check.html">Heat Check</a><a href="./streak-lab.html">Streak Lab</a><a href="./weather.html">Weather</a><a href="./results.html">Results</a><a href="./hr-decision-center.html">Decision Center</a></nav></div></div>
<main class="wrap">
<div class="eyebrow">Today’s Slate</div>
<h1>Home Run Targets</h1>
<p class="sub">Daily game by game HR slate with both probable starters side by side and danger bats grouped under the correct matchup.</p>
<section class="hero" id="hero">Loading today’s live slate</section>
<div class="tabs" id="tabs"></div>
<section class="games" id="games"></section>
</main>
<script>
const state={games:[],active:"all"};
const esc=v=>String(v??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");
const n=v=>{const x=Number(v);return Number.isFinite(x)?x:0};
const val=(v,f="N/A")=>v===undefined||v===null||v===""?f:v;
const norm=v=>String(v??"").trim().toLowerCase();
const code=t=>({"Arizona Diamondbacks":"ARI","Atlanta Braves":"ATL","Baltimore Orioles":"BAL","Boston Red Sox":"BOS","Chicago Cubs":"CHC","Chicago White Sox":"CWS","Cincinnati Reds":"CIN","Cleveland Guardians":"CLE","Colorado Rockies":"COL","Detroit Tigers":"DET","Houston Astros":"HOU","Kansas City Royals":"KC","Los Angeles Angels":"LAA","Los Angeles Dodgers":"LAD","Miami Marlins":"MIA","Milwaukee Brewers":"MIL","Minnesota Twins":"MIN","New York Mets":"NYM","New York Yankees":"NYY","Athletics":"ATH","Oakland Athletics":"ATH","Sacramento Athletics":"ATH","Philadelphia Phillies":"PHI","Pittsburgh Pirates":"PIT","San Diego Padres":"SD","San Francisco Giants":"SF","Seattle Mariners":"SEA","St. Louis Cardinals":"STL","Tampa Bay Rays":"TB","Texas Rangers":"TEX","Toronto Blue Jays":"TOR","Washington Nationals":"WSH"}[t]||String(t||"").split(" ").map(x=>x[0]).join("").slice(0,3).toUpperCase());
async function json(path,fallback){try{const r=await fetch(path+"?v="+Date.now());if(!r.ok)return fallback;return await r.json()}catch{return fallback}}
function rows(p){if(Array.isArray(p))return p;if(!p)return[];return p.matchups||p.games||p.players||p.rows||p.data||p.allPlayers||[]}
function time(g){const d=new Date(g.gameDate||"");return Number.isNaN(d.getTime())?"":d.toLocaleTimeString([],{hour:"numeric",minute:"2-digit"})}
function initials(v){return String(v||"").split(" ").map(x=>x[0]).join("").slice(0,2).toUpperCase()}
function rankScore(h){return h.score??h.hrConfidence??h.powerScore??"N/A"}
function pitcher(g,side){const p=side==="away"?g.awayPitcher:g.homePitcher;return p?.name||p?.pitcher||p||"TBD"}
function side(g,which){const away=which==="away";const team=away?g.awayTeam:g.homeTeam;const opp=away?g.homeTeam:g.awayTeam;const p=away?g.awayPitcher:g.homePitcher;const hitters=away?(g.hitters?.away||[]):(g.hitters?.home||[]);const lineup=away?(g.awayBattingOrder||[]):(g.homeBattingOrder||[]);const pname=p?.name||p?.pitcher||"TBD";const pside=p?.side||p?.throws||"";return `<article class="side"><div class="side-top"><div><div class="pitcher">${esc(pname)}</div><div class="pitcher-sub">${esc(code(team))}${pside?" • "+esc(pside):""} • vs ${esc(code(opp))}</div><div class="mini"><div><label>Team</label><b>${esc(code(team))}</b></div><div><label>Bats</label><b>${hitters.length}</b></div><div><label>Lineup</label><b>${lineup.length?lineup.length+"/9":"Pending"}</b></div><div><label>SP</label><b>${esc(pname)}</b></div></div></div><div class="vbox"><b>${esc(rankScore(hitters[0])||hitters.length)}</b><span>TOP BAT</span></div></div><div class="danger"><div class="danger-head"><span>Danger Batters</span><span>${hitters.length} bats</span></div><div class="bats">${hitters.slice(0,8).map(bat).join("")||`<div class="empty">No hitter data yet for ${esc(team)}</div>`}</div></div></article>`}
function bat(h,i){const edge=h.edge||h.tier||"Watch";const note=Array.isArray(h.reasons)?h.reasons.join(" + "):h.note||"power plus matchup fit";return `<article class="bat"><div class="face">${esc(initials(h.player))}</div><div><div class="bat-name">#${esc(h.rank||i+1)} ${esc(h.player)}</div><div class="tags"><span class="tag green">${esc(edge)}</span>${h.batSide?`<span class="tag teal">${esc(h.batSide)}</span>`:""}${h.opposingPitcher?`<span class="tag gold">vs ${esc(h.opposingPitcher)}</span>`:""}</div><div class="why">${esc(note)}</div></div><div class="score"><b>${esc(rankScore(h))}</b><br/>score</div></article>`}
function weather(w){if(!w)return"";return `<div class="weather"><b>Weather</b><span>${esc(w.temp)}°F</span><span>${esc(w.windSpeed)} mph ${esc(w.windCompass)}</span><span>${esc(w.humidity)}% humidity</span><span>${esc(w.status||"live")}</span></div>`}
function card(g,i){return `<section class="game-card" data-game="${i}"><div class="game-head"><div><h2>${esc(g.awayTeam)} at ${esc(g.homeTeam)}</h2><div class="game-meta">${esc(time(g))}${g.venue?" • "+esc(g.venue):""}${g.status?" • "+esc(g.status):""}</div></div><div class="pill">${esc(g.lineupLockStatus||"Lineups Updating")}</div></div><div class="matchup-grid">${side(g,"away")}${side(g,"home")}</div>${weather(g.weather)}</section>`}
function render(){document.getElementById("hero").innerHTML=`<b>${state.games.length}</b> games loaded today from the daily matchup engine`;document.getElementById("tabs").innerHTML=`<button class="${state.active==="all"?"active":""}" data-game="all">All Games<small>${state.games.length} games</small></button>`+state.games.map((g,i)=>`<button class="${String(state.active)===String(i)?"active":""}" data-game="${i}">${esc(code(g.awayTeam))} at ${esc(code(g.homeTeam))}<small>${esc(time(g))}</small></button>`).join("");document.querySelectorAll("#tabs button").forEach(b=>b.onclick=()=>{state.active=b.dataset.game;render()});const visible=state.active==="all"?state.games:state.games.filter((_,i)=>String(i)===String(state.active));document.getElementById("games").innerHTML=visible.map(card).join("")||`<div class="error">No games loaded. Run the MLB refresh.</div>`}
async function load(){const matchups=await json("./data/game_pitcher_matchups.json",null);const fallback=await json("./data/mlb_games_today.json",null);state.games=rows(matchups).length?rows(matchups):rows(fallback);render()}
load().catch(e=>{document.getElementById("games").innerHTML=`<div class="error">${esc(e.message)}</div>`});
</script>
</body>
</html>
