<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Slip Lab | HR Slate</title>

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#05080a;color:#f3f7f4;font-family:Inter,Arial,sans-serif}
    a{text-decoration:none;color:inherit}

    .topbar{position:sticky;top:0;z-index:1000;background:#070b0d;border-bottom:1px solid rgba(255,255,255,.07)}
    .topbar-inner{max-width:1500px;margin:auto;padding:10px 20px;display:flex;align-items:center;gap:16px}
    .brand{font-size:20px;font-weight:950;margin-right:10px}
    .nav{display:flex;gap:8px;flex-wrap:wrap}
    .nav-pill{background:#10181b;border:1px solid rgba(255,255,255,.08);color:#d9e4df;border-radius:13px;padding:8px 13px;font-size:12px;font-weight:900}
    .nav-pill.active{background:#8cff32;color:#061006;border-color:#8cff32}

    .wrap{max-width:1500px;margin:auto;padding:22px 20px 70px}
    .head{display:flex;justify-content:space-between;gap:16px;margin-bottom:16px}
    .eyebrow{font-size:10px;letter-spacing:.16em;color:#7d8a84;text-transform:uppercase;font-weight:950;margin-bottom:6px}
    .title{font-size:30px;font-weight:950;margin-bottom:6px}
    .sub{font-size:13px;color:#98a59f}

    .live-pill{background:#0d1719;border:1px solid rgba(140,255,50,.18);color:#8cff32;border-radius:999px;padding:8px 12px;font-size:12px;font-weight:950}

    .vuln-panel{background:#090f12;border:1px solid rgba(255,255,255,.07);border-radius:14px;overflow:hidden;margin-bottom:14px}
    .panel-head{display:flex;justify-content:space-between;align-items:center;padding:10px 13px;border-bottom:1px solid rgba(255,255,255,.06)}
    .panel-title{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#9aa6a0;font-weight:950}
    .panel-note{font-size:12px;color:#8cff32;font-weight:950}
    .vuln-strip{display:grid;grid-template-columns:repeat(5,1fr)}
    .vuln-item{padding:11px 13px;border-right:1px solid rgba(255,255,255,.06)}
    .vuln-item:last-child{border-right:none}
    .vuln-rank{font-size:10px;color:#00e0a4;font-weight:950}
    .vuln-score{font-size:20px;color:#8cff32;font-weight:950;margin:2px 0}
    .vuln-name{font-size:13px;font-weight:950}
    .vuln-sub{font-size:11px;color:#8a9690;margin-top:3px}

    .filters{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0}
    .filter{background:#10181b;border:1px solid rgba(255,255,255,.08);color:#dce6e1;border-radius:12px;padding:8px 12px;font-size:11px;font-weight:950;cursor:pointer}
    .filter.active{background:rgba(140,255,50,.14);border-color:rgba(140,255,50,.45);color:#8cff32}

    .game-tabs{display:flex;gap:22px;overflow:auto;margin:8px 0 16px;padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,.07)}
    .game-tab{min-width:max-content;font-size:12px;color:#8f9a95;font-weight:950;cursor:pointer;padding-bottom:8px;border-bottom:2px solid transparent;text-align:center}
    .game-tab.active{color:#fff;border-color:#8cff32}
    .game-tab small{display:block;font-size:10px;color:#65716c;margin-top:2px}

    .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
    .match-card{background:#090f12;border:1px solid rgba(255,255,255,.07);border-radius:14px;overflow:hidden}

    .match-top{padding:14px;border-bottom:1px solid rgba(255,255,255,.06);display:grid;grid-template-columns:1fr 72px;gap:10px;background:linear-gradient(135deg,rgba(20,45,38,.52),rgba(8,12,16,.92))}
    .match-name{font-size:18px;font-weight:950}
    .match-meta{font-size:12px;color:#9aa6a0;margin-top:4px}
    .risk-note{font-size:11px;color:#00e0a4;font-weight:900;margin-top:7px}
    .vbox{height:72px;border-radius:10px;border:1px solid rgba(0,224,164,.28);background:rgba(0,224,164,.08);display:flex;align-items:center;justify-content:center;flex-direction:column}
    .vbox strong{font-size:30px;color:#8cff32}
    .vbox span{font-size:9px;color:#a4afaa;font-weight:950}

    .mini-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:14px}
    .mini{text-align:center}
    .mini label{display:block;font-size:9px;color:#7d8983;text-transform:uppercase;font-weight:950;margin-bottom:3px}
    .mini b{font-size:14px}

    .danger{padding:11px 13px}
    .danger-head{display:flex;justify-content:space-between;align-items:center;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#9aa6a0;font-weight:950;margin-bottom:8px}
    .bats{display:flex;flex-direction:column;gap:7px}

    .bat{display:grid;grid-template-columns:30px 1fr 82px;gap:9px;min-height:96px;padding:9px;border-radius:9px;border-left:3px solid #00e0a4;background:linear-gradient(90deg,rgba(0,224,164,.12),rgba(11,17,21,.96))}
    .bat.prime{border-left-color:#8cff32;background:linear-gradient(90deg,rgba(140,255,50,.15),rgba(11,17,21,.96))}
    .face{width:28px;height:28px;border-radius:50%;background:#1b2b31;border:1px solid rgba(255,255,255,.14);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:950}
    .bat-name{font-size:15px;font-weight:950;margin:3px 0 5px}

    .tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:5px}
    .tag{font-size:9px;font-weight:950;border-radius:6px;padding:4px 6px;border:1px solid rgba(255,255,255,.12);background:#111a1e;color:#dce6e1}
    .tag.green{color:#8cff32;border-color:rgba(140,255,50,.35);background:rgba(140,255,50,.10)}
    .tag.teal{color:#00e0a4;border-color:rgba(0,224,164,.35);background:rgba(0,224,164,.10)}
    .tag.blue{color:#6eb7ff;border-color:rgba(110,183,255,.35);background:rgba(110,183,255,.10)}
    .tag.red{color:#ff6274;border-color:rgba(255,98,116,.35);background:rgba(255,98,116,.10)}
    .tag.gold{color:#ffd25a;border-color:rgba(255,210,90,.35);background:rgba(255,210,90,.10)}

    .why{font-size:11px;color:#c7d1cc;margin-bottom:4px}
    .why strong{color:#00e0a4}
    .last{font-size:11px;color:#8cff32;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}

    .right{text-align:right;font-size:11px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;line-height:1.55;color:#dce6e1}
    .right .hot{color:#8cff32;font-weight:950}

    .split{margin:10px 13px 13px;border:1px solid rgba(255,255,255,.06);border-radius:10px;overflow:hidden;background:#070b0e}
    .split-title{padding:8px 10px;font-size:10px;color:#9aa6a0;letter-spacing:.12em;text-transform:uppercase;font-weight:950;border-bottom:1px solid rgba(255,255,255,.06)}
    table{width:100%;border-collapse:collapse}
    th,td{padding:7px 8px;font-size:10px;border-top:1px solid rgba(255,255,255,.04);text-align:right;color:#dce6e1}
    th:first-child,td:first-child{text-align:left;color:#8cff32;font-weight:950}
    th{color:#7f8b85;text-transform:uppercase;font-size:9px}

    @media(max-width:1050px){
      .grid{grid-template-columns:1fr}
      .vuln-strip{grid-template-columns:repeat(2,1fr)}
    }
  </style>
</head>

<body>
<div class="topbar">
  <div class="topbar-inner">
    <a class="brand" href="./index.html">The Slip Lab</a>
    <nav class="nav">
      <a class="nav-pill active" href="./index.html">Slate</a>
      <a class="nav-pill" href="./full-board.html">Full Board</a>
      <a class="nav-pill" href="./matchup-lab.html">Matchup Lab</a>
      <a class="nav-pill" href="./power-zones.html">Power Zones</a>
      <a class="nav-pill" href="./quick-target.html">Quick Target</a>
      <a class="nav-pill" href="./heat-check.html">Heat Check</a>
      <a class="nav-pill" href="./streak-lab.html">Streak Lab</a>
      <a class="nav-pill" href="./weather.html">Weather</a>
      <a class="nav-pill" href="./results.html">Results</a>
      <a class="nav-pill" href="./hr-decision-center.html">Decision Center</a>
    </nav>
  </div>
</div>

<main class="wrap">
  <section class="head">
    <div>
      <div class="eyebrow">Today’s Slate</div>
      <h1 class="title">Home Run Targets</h1>
      <p class="sub">Pitcher vulnerability, danger bats, power zones, pitch damage, weather carry, and recent HR signals.</p>
    </div>
    <div class="live-pill" id="updated">Loading</div>
  </section>

  <section class="vuln-panel">
    <div class="panel-head">
      <div class="panel-title">Top Vulnerabilities</div>
      <div class="panel-note" id="avgVuln">Loading</div>
    </div>
    <div class="vuln-strip" id="vulnStrip"></div>
  </section>

  <section class="filters">
    <button class="filter active" data-filter="all">All</button>
    <button class="filter" data-filter="zone">Zone 5+</button>
    <button class="filter" data-filter="power">Elite Power</button>
    <button class="filter" data-filter="weather">Weather Carry</button>
    <button class="filter" data-filter="danger">Pitcher Danger</button>
  </section>

  <section class="game-tabs" id="gameTabs"></section>
  <section class="grid" id="grid"></section>
</main>

<script>
let players = [];
let activeGame = "all";
let activeFilter = "all";

function clean(v){return v === null || v === undefined || v === "" ? "N/A" : String(v)}
function n(v){const x=Number(v);return Number.isFinite(x)?x:0}
function one(v){return n(v).toFixed(1)}
function whole(v){return Math.round(n(v))}
function dec(v){return n(v).toFixed(3).replace(/^0/,"")}
function initials(v){return clean(v).split(" ").map(x=>x[0]).join("").slice(0,2).toUpperCase()}
function game(row){return clean(row.game || `${clean(row.team)} vs ${clean(row.opponent)}`)}
function opponentKey(row){return clean(row.opponent || "Opponent")}
function pitcherName(row){return clean(row.pitcher && row.pitcher !== "N/A" ? row.pitcher : "Opponent Pitcher")}

function rowPass(row){
  if(activeFilter === "zone") return n(row.hotZoneCount) >= 5 || n(row.zoneOverlap) >= 55;
  if(activeFilter === "power") return n(row.powerScore) >= 55;
  if(activeFilter === "weather") return n(row.weather) >= 20;
  if(activeFilter === "danger") return n(row.pitcherRisk) >= 55 || n(row.pitcherLeak) >= 65;
  return true;
}

function groupedRows(rows){
  const map = new Map();

  rows.forEach(row => {
    const key = game(row);
    if(!map.has(key)) map.set(key, []);
    map.get(key).push(row);
  });

  return [...map.entries()].map(([key,list]) => ({
    key,
    list:list.sort((a,b)=>n(b.hrConfidence)-n(a.hrConfidence)),
    vuln:list.reduce((s,r)=>s+n(r.pitcherRisk),0) / Math.max(1,list.length)
  })).sort((a,b)=>b.vuln-a.vuln);
}

function tagHTML(row, rank){
  const tags = [
    `<span class="tag red">#${rank}</span>`,
    `<span class="tag ${n(row.hrConfidence)>=52?"green":"gold"}">${n(row.hrConfidence)>=52?"HIGH":"MID"}</span>`,
    `<span class="tag blue">${clean(row.bestPitch)}</span>`,
    `<span class="tag gold">ZONE ${whole(row.hotZoneCount || row.zoneOverlap / 7)}</span>`,
    `<span class="tag teal">PWR ${whole(row.powerScore)}</span>`
  ];

  if(n(row.pitcherRisk)>=55) tags.push(`<span class="tag red">DANGER</span>`);
  if(n(row.weather)>=20) tags.push(`<span class="tag teal">WEATHER</span>`);
  if(n(row.bullpen)>=55) tags.push(`<span class="tag gold">BULLPEN</span>`);

  return tags.slice(0,8).join("");
}

function batter(row, rank){
  const prime = rank === 1 ? "prime" : "";

  return `
    <article class="bat ${prime}">
      <div class="face">${initials(row.player)}</div>
      <div>
        <div class="tags">${tagHTML(row, rank)}</div>
        <div class="bat-name">#${rank} ${clean(row.player)}</div>
        <div class="tags">
          <span class="tag gold">${Math.max(1,whole(n(row.powerScore)/5))} HR</span>
          <span class="tag red">HH ${whole(n(row.powerScore)*.78)}%</span>
          <span class="tag gold">${whole(row.pitcherLeak)} leak</span>
          <span class="tag blue">${whole(row.zoneOverlap)} overlap</span>
        </div>
        <div class="why"><strong>Why it matters:</strong> ${clean(row.reasons?.join(" + ") || "power profile plus matchup fit")}</div>
        <div class="last">L7: ${dec(row.avgZones?.[12]?.value || .250)} AVG · ${whole(row.hrZones?.[12]?.value || 0)} HR · ${dec(row.slgZones?.[12]?.value || .450)} SLG</div>
      </div>
      <div class="right">
        <div>${dec(row.isoZones?.[12]?.value || .180)} ISO</div>
        <div class="hot">${one(n(row.barrelZones?.[12]?.value || .12)*100)}% BRL</div>
        <div class="hot">${whole(row.hrConfidence)} SCORE</div>
      </div>
    </article>
  `;
}

function card(group){
  const top = group.list[0] || {};
  const bats = group.list.slice(0,5);
  const vuln = whole(group.vuln);

  return `
    <section class="match-card">
      <div class="match-top">
        <div>
          <div class="match-name">${pitcherName(top)}</div>
          <div class="match-meta">${opponentKey(top)} · RHP · vs ${clean(top.team)}</div>
          <div class="risk-note">HR risk profile built from attack zones, pitch damage, and power bats</div>

          <div class="mini-stats">
            <div class="mini"><label>Risk</label><b>${vuln}</b></div>
            <div class="mini"><label>Leak</label><b>${whole(top.pitcherLeak)}</b></div>
            <div class="mini"><label>Zone</label><b>${whole(top.zoneOverlap)}</b></div>
            <div class="mini"><label>Bats</label><b>${bats.length}</b></div>
          </div>
        </div>

        <div class="vbox">
          <strong>${vuln}</strong>
          <span>VULN</span>
        </div>
      </div>

      <div class="danger">
        <div class="danger-head">
          <span>Danger Batters</span>
          <span>Top 5</span>
        </div>
        <div class="bats">${bats.map((r,i)=>batter(r,i+1)).join("")}</div>
      </div>

      <div class="split">
        <div class="split-title">Most Dangerous Batting Spots</div>
        <table>
          <thead><tr><th>#</th><th>AVG</th><th>ISO</th><th>SLG</th><th>HR</th><th>BRL</th><th>HH</th></tr></thead>
          <tbody>
            ${bats.slice(0,3).map((r,i)=>`
              <tr>
                <td>#${i+1}</td>
                <td>${dec(r.avgZones?.[12]?.value || .240)}</td>
                <td>${dec(r.isoZones?.[12]?.value || .140)}</td>
                <td>${dec(r.slgZones?.[12]?.value || .420)}</td>
                <td>${whole(r.hrZones?.[12]?.value || 0)}</td>
                <td>${one(n(r.barrelZones?.[12]?.value || .11)*100)}%</td>
                <td>${one(n(r.hardHitZones?.[12]?.value || .42)*100)}%</td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      </div>
    </section>
  `;
}

function renderTop(groups){
  const top = groups.slice(0,5);
  const avg = top.reduce((s,g)=>s+g.vuln,0) / Math.max(1,top.length);
  document.getElementById("avgVuln").textContent = `${one(avg)} avg vuln`;

  document.getElementById("vulnStrip").innerHTML = top.map((g,i)=>{
    const first = g.list[0] || {};
    return `
      <div class="vuln-item">
        <div class="vuln-rank">#${i+1}</div>
        <div class="vuln-score">${whole(g.vuln)}</div>
        <div class="vuln-name">${pitcherName(first)}</div>
        <div class="vuln-sub">${clean(first.opponent)} vs ${clean(first.team)}</div>
      </div>
    `;
  }).join("");
}

function renderTabs(groups){
  document.getElementById("gameTabs").innerHTML = [
    `<div class="game-tab ${activeGame==="all"?"active":""}" data-game="all">All Games<small>${players.length} bats</small></div>`,
    ...groups.map(g=>`<div class="game-tab ${activeGame===g.key?"active":""}" data-game="${g.key}">${g.key}<small>${g.list.length} bats</small></div>`)
  ].join("");

  document.querySelectorAll(".game-tab").forEach(tab=>{
    tab.onclick=()=>{
      activeGame=tab.dataset.game;
      render();
    };
  });
}

function render(){
  const filtered = players.filter(rowPass);
  const groups = groupedRows(filtered);

  renderTop(groups);
  renderTabs(groupedRows(players));

  const visible = activeGame === "all" ? groups : groups.filter(g=>g.key===activeGame);
  document.getElementById("grid").innerHTML = visible.slice(0,12).map(card).join("");
}

async function load(){
  const res = await fetch("./data/hr_decision_center.json?v="+Date.now());
  const json = await res.json();

  players = (json.allPlayers || []).sort((a,b)=>n(b.hrConfidence)-n(a.hrConfidence));

  document.getElementById("updated").textContent = `Live Data Loaded · ${players.length} bats`;

  document.querySelectorAll(".filter").forEach(btn=>{
    btn.onclick=()=>{
      document.querySelectorAll(".filter").forEach(x=>x.classList.remove("active"));
      btn.classList.add("active");
      activeFilter=btn.dataset.filter;
      activeGame="all";
      render();
    };
  });

  render();
}

load();
</script>
</body>
</html>
