<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Slip Lab</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>The Slip Lab</h1>
      <p>Simple sports data. Clean edges. Better decisions.</p>
    </div>
    <nav>
      <button data-sport="mlb" class="active">MLB</button>
      <button data-sport="nba">NBA</button>
      <button data-sport="nhl">NHL</button>
      <button data-sport="nfl">NFL</button>
    </nav>
  </header>

  <main>
    <section class="hero">
      <div>
        <h2 id="page-title">MLB Lab</h2>
      <p id="page-subtitle">Home Runs, Hits, Total Bases, and RBIs.</p>
      </div>
      <div class="badge">Static build • JSON powered</div>
    </section>

    <section class="tabs">
      <button data-market="home_runs" class="active">Home Runs</button>
      <button data-market="hits">Hits</button>
      <button data-market="total_bases">Total Bases</button>
      <button data-market="rbis">RBIs</button>
    </section>

    <section id="board" class="board"></section>
  </main>

  <script src="app.js"></script>
</body>
</html>
