<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Slip Lab | Decision Center</title>

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#05070b;color:#f3f3f3;font-family:Inter,Arial,sans-serif}
    a{text-decoration:none;color:inherit}
    .topbar{width:100%;border-bottom:1px solid rgba(255,255,255,.06);background:#05070b;position:sticky;top:0;z-index:999}
    .topbar-inner{max-width:1600px;margin:auto;padding:12px 22px;display:flex;align-items:center;gap:16px}
    .brand{font-size:20px;font-weight:900;color:white;margin-right:14px;white-space:nowrap}
    .nav{display:flex;gap:8px;flex-wrap:wrap}
    .nav-pill{padding:8px 14px;border-radius:14px;background:#0d1318;border:1px solid rgba(255,255,255,.08);color:#d9d9d9;font-size:12px;font-weight:800}
    .nav-pill.active{background:#93ff2d;color:black;border-color:#93ff2d}
    .wrap{max-width:1600px;margin:auto;padding:24px 22px}
    .title{font-size:32px;font-weight:950;margin-bottom:6px}
    .sub{color:#8e98a3;font-size:13px;margin-bottom:20px}
    .tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
    .tab{background:#0d1318;border:1px solid rgba(255,255,255,.08);color:#d9d9d9;border-radius:14px;padding:10px 13px;font-size:12px;font-weight:900;cursor:pointer}
    .tab.active{background:#93ff2d;color:#05070b;border-color:#93ff2d}
    .status{color:#8e98a3;font-size:12px;margin-bottom:14px}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:14px}
    .card{background:#0b1015;border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:14px}
    .card-top{display:flex;justify-content:space-between;gap:10px;margin-bottom:12px}
    .tier{display:inline-flex;border-radius:999px;background:rgba(147,255,45,.10);border:1px solid rgba(147,255,45,.18);padding:5px 8px;color:#93ff2d;font-weight:950;font-size:10px;margin-bottom:8px}
    .name{font-size:17px;font-weight:950;margin-bottom:4px}
    .meta{font-size:11px;color:#8e98a3}
    .score{font-size:28px;font-weight:950;color:#93ff2d;text-align:right}
    .label{font-size:10px;color:#8e98a3;text-transform:uppercase;font-weight:900;text-align:right}
    .meter{height:8px;background:rgba(255,255,255,.08);border-radius:999px;overflow:hidden;margin:10px 0 14px}
    .fill{height:100%;background:#93ff2d;border-radius:999px}
    .metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    .metric{background:#0d1318;border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:10px}
    .metric-label{font-size:9px;color:#8e98a3;text-transform:uppercase;font-weight:900;margin-bottom:4px}
    .metric-value{font-size:16px;font-weight:950;color:#f3f3f3}
    .pitch{margin-top:10px;background:rgba(147,255,45,.08);border:1px solid rgba(147,255,45,.18);border-radius:12px;padding:10px}
    .pitch-label{font-size:9px;color:#93ff2d;text-transform:uppercase;font-weight:950;margin-bottom:4px}
    .pitch-value{font-size:14px;font-weight:950}
    .why{margin-top:10px;color:#c9d1d9;font-size:12px;line-height:1.45}
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <a class="brand" href="./index.html">The Slip Lab</a>
    <div class="nav">
      <a href="./index.html" class="nav-pill">Slate</a>
      <a href="./full-board.html" class="nav-pill">Full Board</a>
      <a href="./matchup-lab.html" class="nav-pill">Matchup Lab</a>
      <a href="./power-zones.html" class="nav-pill">Power Zones</a>
      <a href="./quick-target.html" class="nav-pill">Quick Target</a>
      <a href="./heat-check.html" class="nav-pill">Heat Check</a>
      <a href="./streak-lab.html" class="nav-pill">Streak Lab</a>
      <a href="./weather.html" class="nav-pill">Weather</a>
      <a href="./results.html" class="nav-pill">Results</a>
      <a href="./hr-decision-center.html" class="nav-pill active">Decision Center</a>
    </div>
  </div>
</div>

<main class="wrap">
  <h1 class="title">Decision Center</h1>
  <p class="sub">Fastest page for choosing HR candidates using confidence, pitch damage, pitcher risk, weather, and power profile.</p>

  <div class="status" id="status">Loading</div>
  <section class="tabs" id="tabs"></section>
  <section class="grid" id="grid"></section>
</main>

<script>
const sections = [
  ["bestPicks","Best HR Picks"],
  ["safestPlays","Safest Plays"],
  ["bestValue","Best Value"],
  ["lottoBombs","Live Longshots"],
  ["pitchTypeEdges","Pitch Edges"],
  ["weatherCarry","Weather Carry"],
  ["bullpenBoosts","Bullpen Boosts"]
];

let active = "bestPicks";
let data = null;

function clean(v){return v === null || v === undefined || v === "" ? "N/A" : String(v)}
function num(v){const n = Number(v); return Number.isFinite(n) ? n : 0}
function score(v){return num(v).toFixed(1)}

function allRows(){
  const map = new Map();
  Object.values(data?.sections || {}).flat().forEach(row => {
    const key = `${row.player}|${row.team}|${row.opponent}`;
    if (!map.has(key)) map.set(key, row);
  });
  return [...map.values()];
}

function rowsFor(key){
  const direct = data?.sections?.[key] || [];
  if (direct.length) return direct;

  const rows = allRows();

  if (key === "bestValue") {
    return rows
      .map(r => ({
        ...r,
        valueScore:
          num(r.pitchEdge) * 0.30 +
          num(r.pitcherRisk) * 0.22 +
          num(r.powerScore) * 0.18 +
          num(r.due) * 0.12 +
          num(r.weather) * 0.08 +
          num(r.bullpen) * 0.10 -
          num(r.hrConfidence) * 0.12
      }))
      .filter(r => num(r.pitchEdge) >= 20 && num(r.powerScore) >= 25 && num(r.hrConfidence) <= 75)
      .sort((a,b) => num(b.valueScore) - num(a.valueScore))
      .slice(0, 40);
  }

  if (key === "pitchTypeEdges") {
    return rows
      .filter(r => num(r.pitchEdge) > 0)
      .sort((a,b) => num(b.pitchEdge) - num(a.pitchEdge))
      .slice(0, 40);
  }

  if (key === "weatherCarry") {
    return rows
      .filter(r => num(r.weather) > 0)
      .sort((a,b) => num(b.weather) - num(a.weather))
      .slice(0, 40);
  }

  if (key === "bullpenBoosts") {
    return rows
      .filter(r => num(r.bullpen) > 0)
      .sort((a,b) => num(b.bullpen) - num(a.bullpen))
      .slice(0, 40);
  }

  return direct;
}

function renderTabs(){
  document.getElementById("tabs").innerHTML = sections.map(([key,label]) => {
    const count = rowsFor(key).length;
    return `
      <button class="tab ${key === active ? "active" : ""}" data-key="${key}">
        ${label} ${count ? `<span style="opacity:.65">(${count})</span>` : ""}
      </button>
    `;
  }).join("");

  document.querySelectorAll(".tab").forEach(btn => {
    btn.addEventListener("click", () => {
      active = btn.dataset.key;
      renderTabs();
      renderGrid();
    });
  });
}

function renderGrid(){
  const rows = rowsFor(active);

  if (!rows.length) {
    document.getElementById("grid").innerHTML = `
      <div class="card">
        <div class="name">No plays in this bucket yet</div>
        <div class="why">This tab has no qualified players from the current data run.</div>
      </div>
    `;
    return;
  }

  document.getElementById("grid").innerHTML = rows.map(row => `
    <article class="card">
      <div class="tier">${clean(row.tier)}</div>

      <div class="card-top">
        <div>
          <div class="name">${clean(row.player)}</div>
          <div class="meta">${clean(row.team)} vs ${clean(row.opponent)}</div>
        </div>

        <div>
          <div class="label">HR Conf</div>
          <div class="score">${score(row.hrConfidence)}</div>
        </div>
      </div>

      <div class="meter">
        <div class="fill" style="width:${Math.min(100, num(row.hrConfidence))}%"></div>
      </div>

      <div class="metrics">
        <div class="metric"><div class="metric-label">Power</div><div class="metric-value">${score(row.powerScore)}</div></div>
        <div class="metric"><div class="metric-label">Pitch Edge</div><div class="metric-value">${score(row.pitchEdge)}</div></div>
        <div class="metric"><div class="metric-label">Pitcher Risk</div><div class="metric-value">${score(row.pitcherRisk)}</div></div>
        <div class="metric"><div class="metric-label">Weather</div><div class="metric-value">${score(row.weather)}</div></div>
        <div class="metric"><div class="metric-label">Bullpen</div><div class="metric-value">${score(row.bullpen)}</div></div>
        <div class="metric"><div class="metric-label">Due</div><div class="metric-value">${score(row.due)}</div></div>
      </div>

      <div class="pitch">
        <div class="pitch-label">Best Pitch Matchup</div>
        <div class="pitch-value">${clean(row.bestPitch)}</div>
      </div>

      <div class="why">
        ${(row.reasons && row.reasons.length) ? row.reasons.join(", ") : "HR profile connected."}
      </div>
    </article>
  `).join("");
}

async function load(){
  const res = await fetch("./data/hr_decision_center.json?v=" + Date.now());
  data = await res.json();

  document.getElementById("status").textContent =
    `Updated ${new Date(data.updatedAt).toLocaleString()} • ${data.totalPlayers} HR candidates`;

  renderTabs();
  renderGrid();
}

load();
</script>

<script src="./player_card_patch.js?v=pitch-spot-final-20260527"></script>
</body>
</html>
