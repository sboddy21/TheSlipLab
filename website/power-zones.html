<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Slip Lab | Power Zones</title>

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#05070b;color:#f3f3f3;font-family:Inter,Arial,sans-serif}
    a{text-decoration:none;color:inherit}

    .topbar{width:100%;border-bottom:1px solid rgba(255,255,255,.06);background:#05070b;position:sticky;top:0;z-index:999}
    .topbar-inner{max-width:1600px;margin:auto;padding:12px 22px;display:flex;align-items:center;gap:16px}
    .brand{font-size:20px;font-weight:900;color:white;margin-right:14px;white-space:nowrap}
    .nav{display:flex;gap:8px;flex-wrap:wrap}
    .nav-pill{padding:8px 14px;border-radius:14px;background:#0d1318;border:1px solid rgba(255,255,255,.08);color:#d9d9d9;font-size:12px;font-weight:800}
    .nav-pill.active{background:#93ff2d;color:black;border-color:#93ff2d}

    .wrap{max-width:1600px;margin:auto;padding:24px 22px}
    .title{font-size:32px;font-weight:950;margin-bottom:6px}
    .sub{color:#8e98a3;font-size:13px;margin-bottom:20px}

    .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:18px;flex-wrap:wrap}
    .search{flex:1;min-width:260px;background:#0d1318;border:1px solid rgba(255,255,255,.08);color:#fff;border-radius:14px;padding:12px 14px;font-weight:800}
    .small-pill{background:#0d1318;border:1px solid rgba(255,255,255,.08);color:#d9d9d9;border-radius:14px;padding:11px 14px;font-size:12px;font-weight:900}

    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
    .card{background:#0b1015;border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:14px}
    .top{display:flex;justify-content:space-between;gap:10px;margin-bottom:12px}
    .name{font-size:16px;font-weight:950}
    .meta{font-size:11px;color:#8e98a3;margin-top:4px}
    .score{font-size:26px;font-weight:950;color:#93ff2d;text-align:right}
    .label{font-size:10px;color:#8e98a3;text-transform:uppercase;font-weight:900;text-align:right}

    .pitch-box{background:rgba(147,255,45,.08);border:1px solid rgba(147,255,45,.18);border-radius:14px;padding:12px;margin-bottom:12px}
    .pitch-label{font-size:10px;text-transform:uppercase;color:#93ff2d;font-weight:950;margin-bottom:4px}
    .pitch-name{font-size:18px;font-weight:950}

    .metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    .metric{background:#0d1318;border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:10px}
    .metric-label{font-size:9px;color:#8e98a3;text-transform:uppercase;font-weight:900;margin-bottom:4px}
    .metric-value{font-size:16px;font-weight:950;color:#f3f3f3}

    .why{margin-top:12px;color:#c9d1d9;font-size:12px;line-height:1.45}
  </style>
</head>

<body>

<div class="topbar">
  <div class="topbar-inner">
    <a class="brand" href="./index.html">The Slip Lab</a>
    <div class="nav">
      <a href="./index.html" class="nav-pill">Slate</a>
      <a href="./full-board.html" class="nav-pill">Full Board</a>
      <a href="./matchup-lab.html" class="nav-pill">Matchup Lab</a>
      <a href="./power-zones.html" class="nav-pill active">Power Zones</a>
      <a href="./quick-target.html" class="nav-pill">Quick Target</a>
      <a href="./heat-check.html" class="nav-pill">Heat Check</a>
      <a href="./streak-lab.html" class="nav-pill">Streak Lab</a>
      <a href="./weather.html" class="nav-pill">Weather</a>
      <a href="./results.html" class="nav-pill">Results</a>
      <a href="./hr-decision-center.html" class="nav-pill">Decision Center</a>
    </div>
  </div>
</div>

<main class="wrap">
  <h1 class="title">Power Zones</h1>
  <p class="sub">Find hitters with the strongest pitch damage profile and HR swing fit today.</p>

  <div class="toolbar">
    <input id="search" class="search" placeholder="Search player, team, pitch type, or tier"/>
    <div class="small-pill" id="status">Loading</div>
  </div>

  <section class="grid" id="grid"></section>
</main>

<script>
let players = [];

function clean(v){return v === null || v === undefined || v === "" ? "N/A" : String(v)}
function score(v){const n = Number(v); return Number.isFinite(n) ? n.toFixed(1) : "0.0"}

function render(){
  const q = document.getElementById("search").value.toLowerCase();

  const rows = players
    .filter(row => Number(row.pitchEdge || 0) > 0)
    .filter(row => {
      const hay = [
        row.player,
        row.team,
        row.opponent,
        row.game,
        row.bestPitch,
        row.tier
      ].join(" ").toLowerCase();

      return hay.includes(q);
    })
    .sort((a,b) => Number(b.pitchEdge || 0) - Number(a.pitchEdge || 0));

  document.getElementById("status").textContent = `${rows.length} power zone bats`;

  document.getElementById("grid").innerHTML = rows.map(row => `
    <article class="card">
      <div class="top">
        <div>
          <div class="name">${clean(row.player)}</div>
          <div class="meta">${clean(row.team)} vs ${clean(row.opponent)}</div>
        </div>
        <div>
          <div class="label">Pitch Edge</div>
          <div class="score">${score(row.pitchEdge)}</div>
        </div>
      </div>

      <div class="pitch-box">
        <div class="pitch-label">Best Pitch Damage</div>
        <div class="pitch-name">${clean(row.bestPitch)}</div>
      </div>

      <div class="metrics">
        <div class="metric">
          <div class="metric-label">HR Conf</div>
          <div class="metric-value">${score(row.hrConfidence)}</div>
        </div>

        <div class="metric">
          <div class="metric-label">Power</div>
          <div class="metric-value">${score(row.powerScore)}</div>
        </div>

        <div class="metric">
          <div class="metric-label">Pitcher Risk</div>
          <div class="metric-value">${score(row.pitcherRisk)}</div>
        </div>
      </div>

      <div class="why">
        ${clean(row.player)} has a strong pitch damage profile today, with the best matchup showing against ${clean(row.bestPitch)}.
      </div>
    </article>
  `).join("");
}

async function load(){
  const res = await fetch("./data/hr_decision_center.json?v=" + Date.now());
  const json = await res.json();

  players = json.allPlayers || [];

  document.getElementById("search").addEventListener("input", render);

  render();
}

load();
</script>

</body>
</html>
