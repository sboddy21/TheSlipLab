<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Slip Lab | Quick Target</title>

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#05070b;color:#f3f3f3;font-family:Inter,Arial,sans-serif}
    a{text-decoration:none;color:inherit}

    .topbar{width:100%;border-bottom:1px solid rgba(255,255,255,.06);background:#05070b;position:sticky;top:0;z-index:999}
    .topbar-inner{max-width:1600px;margin:auto;padding:12px 22px;display:flex;align-items:center;gap:16px}
    .brand{font-size:20px;font-weight:900;color:white;margin-right:14px;white-space:nowrap}
    .nav{display:flex;gap:8px;flex-wrap:wrap}
    .nav-pill{padding:8px 14px;border-radius:14px;background:#0d1318;border:1px solid rgba(255,255,255,.08);color:#d9d9d9;font-size:12px;font-weight:800}
    .nav-pill.active{background:#93ff2d;color:black;border-color:#93ff2d}

    .wrap{max-width:1600px;margin:auto;padding:24px 22px}
    .title{font-size:32px;font-weight:950;margin-bottom:6px}
    .sub{color:#8e98a3;font-size:13px;margin-bottom:20px}

    .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:18px;flex-wrap:wrap}
    .search{flex:1;min-width:260px;background:#0d1318;border:1px solid rgba(255,255,255,.08);color:#fff;border-radius:14px;padding:12px 14px;font-weight:800}
    .small-pill{background:#0d1318;border:1px solid rgba(255,255,255,.08);color:#d9d9d9;border-radius:14px;padding:11px 14px;font-size:12px;font-weight:900}

    .games{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:14px}
    .game-card{background:#0b1015;border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:14px}
    .game-head{display:flex;justify-content:space-between;gap:10px;margin-bottom:12px;border-bottom:1px solid rgba(255,255,255,.06);padding-bottom:10px}
    .game-title{font-size:15px;font-weight:950}
    .game-count{color:#93ff2d;font-size:12px;font-weight:950}

    .target-row{display:grid;grid-template-columns:34px 1fr 58px;gap:10px;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.055)}
    .target-row:last-child{border-bottom:none}
    .rank{height:26px;width:26px;border-radius:9px;background:rgba(147,255,45,.12);color:#93ff2d;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:950}
    .player{font-size:13px;font-weight:950}
    .meta{font-size:11px;color:#8e98a3;margin-top:3px}
    .score{font-size:20px;font-weight:950;color:#93ff2d;text-align:right}
    .tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
    .tag{font-size:10px;font-weight:900;color:#d9d9d9;background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.06);border-radius:999px;padding:4px 7px}
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <a class="brand" href="./index.html">The Slip Lab</a>
    <div class="nav">
      <a href="./index.html" class="nav-pill">Slate</a>
      <a href="./full-board.html" class="nav-pill">Full Board</a>
      <a href="./matchup-lab.html" class="nav-pill">Matchup Lab</a>
      <a href="./power-zones.html" class="nav-pill">Power Zones</a>
      <a href="./quick-target.html" class="nav-pill active">Quick Target</a>
      <a href="./heat-check.html" class="nav-pill">Heat Check</a>
      <a href="./streak-lab.html" class="nav-pill">Streak Lab</a>
      <a href="./results.html" class="nav-pill">Results</a>
      <a href="./hr-decision-center.html" class="nav-pill">Decision Center</a>
    </div>
  </div>
</div>

<main class="wrap">
  <h1 class="title">Quick Target</h1>
  <p class="sub">Top HR candidates grouped by game so you can scan the slate fast.</p>

  <div class="toolbar">
    <input id="search" class="search" placeholder="Search player, team, or game"/>
    <div class="small-pill" id="status">Loading</div>
  </div>

  <section class="games" id="games"></section>
</main>

<script>
let players = [];

function clean(v){return v === null || v === undefined || v === "" ? "N/A" : String(v)}
function score(v){const n = Number(v); return Number.isFinite(n) ? n.toFixed(1) : "0.0"}

function groupByGame(rows){
  const map = new Map();

  rows.forEach(row => {
    const game = clean(row.game);
    if(!map.has(game)) map.set(game, []);
    map.get(game).push(row);
  });

  return Array.from(map.entries()).map(([game, list]) => ({
    game,
    list: list.sort((a,b) => Number(b.hrConfidence || 0) - Number(a.hrConfidence || 0)).slice(0,4)
  }));
}

function render(){
  const q = document.getElementById("search").value.toLowerCase();

  const filtered = players.filter(row => {
    const hay = [
      row.player,
      row.team,
      row.opponent,
      row.game,
      row.bestPitch,
      row.tier
    ].join(" ").toLowerCase();

    return hay.includes(q);
  });

  const groups = groupByGame(filtered);

  document.getElementById("status").textContent = `${filtered.length} hitters`;

  document.getElementById("games").innerHTML = groups.map(group => `
    <article class="game-card">
      <div class="game-head">
        <div class="game-title">${clean(group.game)}</div>
        <div class="game-count">${group.list.length} targets</div>
      </div>

      ${group.list.map((row,index) => `
        <div class="target-row">
          <div class="rank">${index + 1}</div>
          <div>
            <div class="player">${clean(row.player)}</div>
            <div class="meta">${clean(row.team)} vs ${clean(row.opponent)} • Best pitch: ${clean(row.bestPitch)}</div>
            <div class="tags">
              <span class="tag">${clean(row.tier)}</span>
              <span class="tag">Power ${score(row.powerScore)}</span>
              <span class="tag">Pitch ${score(row.pitchEdge)}</span>
            </div>
          </div>
          <div class="score">${score(row.hrConfidence)}</div>
        </div>
      `).join("")}
    </article>
  `).join("");
}

async function load(){
  const res = await fetch("./data/hr_decision_center.json?v=" + Date.now());
  const json = await res.json();

  players = json.allPlayers || [];

  document.getElementById("search").addEventListener("input", render);

  render();
}

load();
</script>

</body>
</html>
