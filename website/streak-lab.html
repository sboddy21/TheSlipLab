<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Slip Lab | Streak Lab</title>

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#05070b;color:#f3f3f3;font-family:Inter,Arial,sans-serif}
    a{text-decoration:none;color:inherit}
    .topbar{width:100%;border-bottom:1px solid rgba(255,255,255,.06);background:#05070b;position:sticky;top:0;z-index:999}
    .topbar-inner{max-width:1600px;margin:auto;padding:12px 22px;display:flex;align-items:center;gap:16px}
    .brand{font-size:20px;font-weight:900;color:white;margin-right:14px;white-space:nowrap}
    .nav{display:flex;gap:8px;flex-wrap:wrap}
    .nav-pill{padding:8px 14px;border-radius:14px;background:#0d1318;border:1px solid rgba(255,255,255,.08);color:#d9d9d9;font-size:12px;font-weight:800}
    .nav-pill.active{background:#93ff2d;color:black;border-color:#93ff2d}
    .wrap{max-width:1600px;margin:auto;padding:24px 22px}
    .title{font-size:32px;font-weight:950;margin-bottom:6px}
    .sub{color:#8e98a3;font-size:13px;margin-bottom:20px}
    .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:18px;flex-wrap:wrap}
    .search{flex:1;min-width:260px;background:#0d1318;border:1px solid rgba(255,255,255,.08);color:#fff;border-radius:14px;padding:12px 14px;font-weight:800}
    .small-pill{background:#0d1318;border:1px solid rgba(255,255,255,.08);color:#d9d9d9;border-radius:14px;padding:11px 14px;font-size:12px;font-weight:900}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
    .card{background:#0b1015;border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:14px}
    .top{display:flex;justify-content:space-between;gap:10px;margin-bottom:12px}
    .name{font-size:16px;font-weight:950}
    .meta{font-size:11px;color:#8e98a3;margin-top:4px}
    .score{font-size:26px;font-weight:950;color:#93ff2d;text-align:right}
    .label{font-size:10px;color:#8e98a3;text-transform:uppercase;font-weight:900;text-align:right}
    .track{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin:12px 0}
    .dot{height:30px;border-radius:10px;background:#0d1318;border:1px solid rgba(255,255,255,.07);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:950;color:#8e98a3}
    .dot.hot{background:rgba(147,255,45,.12);border-color:rgba(147,255,45,.22);color:#93ff2d}
    .metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    .metric{background:#0d1318;border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:10px}
    .metric-label{font-size:9px;color:#8e98a3;text-transform:uppercase;font-weight:900;margin-bottom:4px}
    .metric-value{font-size:16px;font-weight:950;color:#f3f3f3}
    .why{margin-top:12px;color:#c9d1d9;font-size:12px;line-height:1.45}
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <a class="brand" href="./index.html">The Slip Lab</a>
    <div class="nav">
      <a href="./index.html" class="nav-pill">Slate</a>
      <a href="./full-board.html" class="nav-pill">Full Board</a>
      <a href="./matchup-lab.html" class="nav-pill">Matchup Lab</a>
      <a href="./power-zones.html" class="nav-pill">Power Zones</a>
      <a href="./quick-target.html" class="nav-pill">Quick Target</a>
      <a href="./heat-check.html" class="nav-pill">Heat Check</a>
      <a href="./streak-lab.html" class="nav-pill active">Streak Lab</a>
      <a href="./weather.html" class="nav-pill">Weather</a>
      <a href="./results.html" class="nav-pill">Results</a>
      <a href="./hr-decision-center.html" class="nav-pill">Decision Center</a>
    </div>
  </div>
</div>

<main class="wrap">
  <h1 class="title">Streak Lab</h1>
  <p class="sub">Power trend board for hitters with repeatable HR indicators across confidence, due pressure, and pitch damage.</p>

  <div class="toolbar">
    <input id="search" class="search" placeholder="Search player, team, opponent, pitch type, or tier"/>
    <div class="small-pill" id="status">Loading</div>
  </div>

  <section class="grid" id="grid"></section>
</main>

<script>
let players = [];

function clean(v){return v === null || v === undefined || v === "" ? "N/A" : String(v)}
function score(v){const n = Number(v); return Number.isFinite(n) ? n.toFixed(1) : "0.0"}
function num(v){const n = Number(v); return Number.isFinite(n) ? n : 0}

function streakScore(row){
  return (
    num(row.hrConfidence) * .30 +
    num(row.powerScore) * .25 +
    num(row.pitchEdge) * .20 +
    num(row.due) * .25
  );
}

function dotClass(value, threshold){
  return num(value) >= threshold ? "dot hot" : "dot";
}

function strongestMetric(row){
  const metrics = [
    {key:"power", label:"power", value:num(row.powerScore)},
    {key:"pitch", label:"pitch damage", value:num(row.pitchEdge)},
    {key:"hr", label:"HR confidence", value:num(row.hrConfidence)},
    {key:"due", label:"due pressure", value:num(row.due)},
    {key:"env", label:"environment", value:num(row.weather)}
  ];

  return metrics.sort((a,b) => b.value - a.value)[0];
}

function streakSummary(row){
  const player = clean(row.player);
  const pitch = clean(row.bestPitch);
  const power = num(row.powerScore);
  const pitchEdge = num(row.pitchEdge);
  const hr = num(row.hrConfidence);
  const due = num(row.due);
  const env = num(row.weather);
  const top = strongestMetric(row);

  const lead =
    power >= 80 ? "Elite power profile" :
    power >= 70 ? "Strong power profile" :
    hr >= 60 ? "HR confidence is carrying the profile" :
    due >= 55 ? "Due pressure is building" :
    pitchEdge >= 55 ? "Pitch matchup is the main driver" :
    "Balanced HR profile";

  const pitchLine =
    pitchEdge >= 70 ? `with major damage indicators against ${pitch}` :
    pitchEdge >= 55 ? `with a strong pitch edge against ${pitch}` :
    pitchEdge >= 40 ? `with usable pitch damage against ${pitch}` :
    `with ${pitch} showing as the best available pitch angle`;

  const second =
    top.key === "power" ? `Power score leads the card at ${score(power)}.` :
    top.key === "pitch" ? `Pitch edge is the strongest signal at ${score(pitchEdge)}.` :
    top.key === "hr" ? `HR confidence is the top signal at ${score(hr)}.` :
    top.key === "due" ? `Due score is elevated at ${score(due)}.` :
    `Environment support is part of the profile at ${score(env)}.`;

  const closer =
    due >= 55 && pitchEdge >= 55 ? "Due pressure and pitch damage are both live." :
    power >= 75 && hr >= 55 ? "Power and HR confidence are both supporting the look." :
    env >= 30 ? "Weather adds some extra support to the setup." :
    "Best used as a profile read, not a blind play.";

  return `${lead} ${pitchLine}. ${second} ${closer}`;
}

function render(){
  const q = document.getElementById("search").value.toLowerCase();

  const rows = players
    .filter(row => {
      const hay = [
        row.player,
        row.team,
        row.opponent,
        row.game,
        row.bestPitch,
        row.tier
      ].join(" ").toLowerCase();

      return hay.includes(q);
    })
    .map(row => ({...row, streak: streakScore(row)}))
    .sort((a,b) => b.streak - a.streak)
    .slice(0,60);

  document.getElementById("status").textContent = `${rows.length} streak profiles`;

  document.getElementById("grid").innerHTML = rows.map(row => `
    <article class="card">
      <div class="top">
        <div>
          <div class="name">${clean(row.player)}</div>
          <div class="meta">${clean(row.team)} vs ${clean(row.opponent)}</div>
        </div>
        <div>
          <div class="label">Streak</div>
          <div class="score">${score(row.streak)}</div>
        </div>
      </div>

      <div class="track">
        <div class="${dotClass(row.hrConfidence,50)}">HR</div>
        <div class="${dotClass(row.powerScore,50)}">PWR</div>
        <div class="${dotClass(row.pitchEdge,50)}">PCH</div>
        <div class="${dotClass(row.due,45)}">DUE</div>
        <div class="${dotClass(row.weather,20)}">ENV</div>
      </div>

      <div class="metrics">
        <div class="metric">
          <div class="metric-label">HR Conf</div>
          <div class="metric-value">${score(row.hrConfidence)}</div>
        </div>
        <div class="metric">
          <div class="metric-label">Power</div>
          <div class="metric-value">${score(row.powerScore)}</div>
        </div>
        <div class="metric">
          <div class="metric-label">Due</div>
          <div class="metric-value">${score(row.due)}</div>
        </div>
      </div>

      <div class="why">${streakSummary(row)}</div>
    </article>
  `).join("");
}

async function load(){
  const res = await fetch("./data/hr_decision_center.json?v=" + Date.now());
  const json = await res.json();

  players = json.allPlayers || [];

  document.getElementById("search").addEventListener("input", render);

  render();
}

load();
</script>

</body>
</html>
